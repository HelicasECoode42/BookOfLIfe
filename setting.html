<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>设置 · 人生之书</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <main class="screen-page spread-page settings-page">
    <section class="open-book">
      <div class="book-spine wide"></div>

      <aside class="page-archive">
        <div class="page-title">
          <span class="page-kicker">书签</span>
          <h1>这里不是第一次开始的地方，只是改一改已经有的卡片</h1>
        </div>
        <p class="settings-copy">
          名字、照片、温伴形象和几个基本开关，都可以在这里慢慢改。
        </p>
      </aside>

      <section class="page-settings-form">
        <div class="page-head">
          <div>
            <span class="page-kicker">细节</span>
            <h2>把你和温伴的卡片放顺一点</h2>
          </div>
          <div class="head-links">
            <a href="index.html">封面</a>
            <a href="chat.html">温伴</a>
          </div>
        </div>

        <section class="user-card-panel">
          <div class="avatar-config-copy">
            <span class="page-kicker">使用者</span>
            <h3>这是你的卡片</h3>
            <p>这张照片属于你自己，不是回忆照片墙里的内容。</p>
          </div>
          <div class="avatar-preview-card">
            <img class="companion-avatar-image settings-avatar-image" data-user-photo hidden />
            <div class="avatar-preview-copy">
              <strong data-user-name>你</strong>
              <p>这张照片会用于首次进入、封面和设置页展示。</p>
              <span id="userCardStatus">还没有放个人照片</span>
            </div>
          </div>
          <div class="avatar-config-grid">
            <label class="wide">
              <span>更新你的照片</span>
              <input id="userPhotoUploadInput" type="file" accept="image/*" capture="user" />
            </label>
          </div>
        </section>

        <div class="settings-grid">
          <label>
            <span>你的名字</span>
            <input id="profileNameInput" type="text" />
          </label>
          <label>
            <span>你希望她说话的感觉</span>
            <input id="profileToneInput" type="text" />
          </label>
          <label>
            <span>她的名字</span>
            <input id="companionNameInput" type="text" />
          </label>
          <label>
            <span>书页主色</span>
            <input id="accentInput" type="color" />
          </label>
          <label>
            <span>字体大小</span>
            <select id="fontSizeInput">
              <option value="16px">标准 16px</option>
              <option value="17px">推荐 17px</option>
              <option value="19px">偏大 19px</option>
              <option value="21px">大字 21px</option>
            </select>
          </label>
          <label>
            <span>开启语音播报</span>
            <input id="voiceOutputEnabledInput" type="checkbox" />
          </label>
          <label>
            <span>回复后自动朗读</span>
            <input id="autoSpeakReplyInput" type="checkbox" />
          </label>
          <label>
            <span>识别后自动发送</span>
            <input id="autoSendVoiceInputInput" type="checkbox" />
          </label>
        </div>

        <section class="avatar-config-panel">
          <div class="avatar-config-copy">
            <span class="page-kicker">数字人形象</span>
            <h3>给温伴换一张更像她的形象</h3>
            <p>这里只改她的样子，不改她怎么理解你。</p>
          </div>
          <div class="avatar-config-grid">
            <label class="wide">
              <span>形象描述</span>
              <textarea id="avatarPromptInput"></textarea>
            </label>
            <label class="wide">
              <span>画面风格</span>
              <input id="avatarStyleInput" type="text" />
            </label>
            <label class="wide">
              <span>场景提示</span>
              <input id="avatarSceneInput" type="text" />
            </label>
          </div>
          <div class="avatar-preview-card">
            <img class="companion-avatar-image settings-avatar-image" data-companion-avatar hidden />
            <div class="avatar-preview-copy">
              <strong data-companion-name></strong>
              <p id="avatarPreviewPrompt">还没有单独生成形象。</p>
              <span id="avatarGenerateStatus">还没有生成过形象</span>
            </div>
          </div>
          <div class="panel-actions">
            <button type="button" onclick="generateCompanionAvatar()">生成并保存形象</button>
          </div>
        </section>

        <div class="panel-actions top-gap">
          <button onclick="saveSettingsForm()">更新这本书的气质</button>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
