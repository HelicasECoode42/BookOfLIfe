<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>温伴 · 人生之书</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>
  <script src="script.js" defer></script>
</head>
<body data-live2d="chat">
  <main class="screen-page spread-page">
    <section class="open-book">
      <div class="book-spine wide"></div>

      <aside class="page-face">
        <div class="page-title">
          <span class="page-kicker">温伴</span>
          <h1>和她说话，就像翻开一本会回应的书</h1>
        </div>

        <div class="companion-stage" id="companionStage">
          <div class="stage-shelf"></div>
          <div class="stage-glow"></div>
          <div class="stage-orbit orbit-one"></div>
          <div class="stage-orbit orbit-two"></div>
          <div class="stage-pulse"></div>
          <img class="companion-avatar-image stage-avatar-image" data-companion-avatar hidden />
          <div class="companion-plaque">
            <span data-companion-name></span>
            <strong id="companionStatus">她正在轻轻看着你</strong>
          </div>
        </div>

        <div class="face-note">
          <p id="ambientQuote">有些故事不急着说完，今天也可以只说一小段。</p>
        </div>
      </aside>

      <section class="page-chat">
        <div class="page-head">
          <div>
            <span class="page-kicker">今日对话</span>
            <h2>先说一句。想从照片开始，也可以。</h2>
          </div>
          <div class="head-links">
            <a href="index.html">封面</a>
            <a href="memory.html">忆光</a>
          </div>
        </div>

        <div class="chat-scroll" id="chatBox"></div>

        <div class="chat-entry">
          <div class="entry-shell">
            <button id="voiceBtn" class="round-action" onclick="toggleVoice()">听</button>
            <button id="chatPhotoBtn" class="round-action" onclick="triggerChatPhotoInput()">照</button>
            <input id="chatPhotoInput" type="file" accept="image/*" capture="environment" hidden />
            <input id="userInput" type="text" placeholder="慢一点说也没关系，她会等你" />
            <button id="speakBtn" class="round-action" onclick="toggleSpeechOutput()">说</button>
            <button class="send-action" onclick="talk()">送出</button>
          </div>
          <div class="entry-actions">
            <span class="voice-status" id="voiceStatus">语音待命</span>
            <button class="ghost-btn" onclick="exportLastToMemory()">收进这一页</button>
          </div>
        </div>
      </section>
    </section>
  </main>
  <aside class="memory-cue-float" id="memoryCueFloat" hidden></aside>
</body>
</html>
