    function renderChat() {
      const root = document.getElementById("chatScroll");
      root.innerHTML = "";

      state.messages.forEach((item, index) => {
        if (item.type === "cue") {
          const cue = document.createElement("div");
          cue.className = "memory-cue";
          cue.innerHTML = `
            <div class="cue-text">${item.text}</div>
            <button type="button" class="cue-fix" data-cue-index="${index}">纠正</button>
          `;
          root.appendChild(cue);
          return;
        }

        const row = document.createElement("div");
        row.className = `msg-row ${item.type}`;
        const head = item.type === "ai"
          ? `
            <div class="msg-head">
              <span class="mini-avatar">${escapeHtml(getCompanionShortName())}</span>
              <span>${escapeHtml(getCompanionName())}</span>
            </div>
          `
          : "";

        let bubbleClass = "bubble";
        let bubbleContent = escapeHtml(item.text || "");

        if (item.image || item.imageUrl) {
          bubbleClass += " image-bubble";
          bubbleContent = item.imageUrl
            ? `<div class="photo-placeholder" style="background-image:url('${escapeAttribute(item.imageUrl)}');background-size:cover;background-position:center;border:none;color:transparent;">${escapeHtml(item.text || "照片")}</div>`
            : `<div class="photo-placeholder">${escapeHtml(item.text || "照片")}</div>`;
        }

        row.innerHTML = `
          ${head}
          <div class="${bubbleClass}">${bubbleContent}</div>
        `;
        root.appendChild(row);
      });

      root.querySelectorAll("[data-cue-index]").forEach((button) => {
        button.addEventListener("click", () => {
          const cue = state.messages[Number(button.dataset.cueIndex)]?.text || "";
          openSheet("candidateDecision", {
            text: cue.replace(/^整理/, "我想整理")
          });
        });
      });

      root.scrollTop = root.scrollHeight;
    }

    function appendUserMessage(text, options = {}) {
      state.messages.push(normalizeChatMessage({
        type: "user",
        text,
        image: Boolean(options.image),
        imageUrl: options.imageUrl || "",
        createdAt: options.createdAt || toIsoNow()
      }));
      renderChat();
    }

    function appendAiReply(text, cue = "") {
      if (cue) {
        state.messages.push(normalizeChatMessage({
          type: "cue",
          text: cue,
          createdAt: toIsoNow()
        }));
      }
      state.messages.push(normalizeChatMessage({
        type: "ai",
        text,
        status: "她在回想",
        createdAt: toIsoNow()
      }));
      updateCompanionStatus("她在回想");
      renderChat();
      maybeSpeak(text);
      window.setTimeout(() => updateCompanionStatus("她正在听"), 1200);
    }

    function playAiReply(reply) {
      const root = document.getElementById("chatScroll");
      const typing = createTypingRow();
      root.appendChild(typing);
      root.scrollTop = root.scrollHeight;
      updateCompanionStatus("她在回想");

      window.setTimeout(() => {
        typing.remove();
        appendAiReply(reply.text, reply.cue);
      }, 1500);
    }

    async function sendTextMessage() {
      const input = document.getElementById("chatInput");
      const value = String(input.value || "").trim();
      if (!value) return;
      const conversation = getActiveConversation();
      if (conversation && conversation.title === "新的聊天") {
        conversation.title = deriveThreadTitleFromText(value);
        conversation.subtitle = "刚刚继续了一段新对话";
        syncLegacyChatStateFromConversations();
      }
      appendUserMessage(value);
      input.value = "";
      await persistChatState();
      await maybeCaptureHealthProfile(value);

      if (detectExplicitMemorySaveIntent(value)) {
        const draftText = buildExplicitMemoryDraftText(value);
        openSheet("memory", {
          text: draftText || "",
          source: "explicit_save"
        });
        appendAiReply(draftText ? "这一段我给你打开忆光了，你看一眼再保存。" : "忆光已经打开了。你把想留下的那段补一句，我就帮你收进去。");
        return;
      }

      const retrieval = buildRetrievalContext(value);
      let replyPlan = {};
      try {
        replyPlan = await requestReplyPlan(value, retrieval);
        logPipelineStep("reply-plan", replyPlan);
      } catch (error) {
        console.error(error);
      }

      state.strategyTrail.unshift({
        id: `strategy_${Date.now()}_${Math.random().toString(16).slice(2, 6)}`,
        createdAt: toIsoNow(),
        text: value,
        responseMode: String(replyPlan.responseMode || "").trim(),
        replyStrategy: String(replyPlan.replyStrategy || "").trim(),
        selfJudgment: String(replyPlan.selfJudgment || "").trim(),
        reason: String(replyPlan.reason || "").trim()
      });
      state.strategyTrail = state.strategyTrail.slice(0, 12);
      maybeAppendRevisionLog(value, replyPlan);

      const candidatePromise = requestMemoryFilter(value, replyPlan, retrieval).catch((error) => {
        console.error(error);
        return null;
      });

      let replyText = "";
      try {
        replyText = await requestAiReply(value, replyPlan, retrieval);
      } catch (error) {
        console.error(error);
      }

      let candidate = await candidatePromise;
      if (!candidate?.memorySignal) {
        const localCandidate = deriveLocalMemoryCandidate(value, replyPlan);
        if (localCandidate) {
          candidate = localCandidate;
        }
      }
      logPipelineStep("memory-filter", candidate || { memorySignal: false });
      if (candidate?.memorySignal) {
        const existing = state.memoryCandidates.find((item) => {
          const sourceText = String(item.sourceText || "").trim();
          const label = String(item.label || "").trim();
          return sourceText === String(candidate.filteredText || "").trim()
            || label === String(candidate.summary || "").trim();
        });

        const entry = existing || pushMemoryCandidate(candidate);
        if (!existing) {
          state.messages.push(normalizeChatMessage({
            type: "cue",
            text: `${entry.label}。要不要现在整理进忆光？`,
            createdAt: toIsoNow()
          }));
        }
        state.pendingOpen = true;
        document.getElementById("pendingList")?.classList.add("open");
        state.activeEventContext = buildActiveEventFromTurn(value, replyPlan, candidate);
        renderChat();
        renderPendingCues();
        openSheet("candidateDecision", {
          candidateId: entry.id,
          label: entry.label,
          text: entry.sourceText
        });
        await persistDerivedState();
      } else if (replyPlan?.eventLinkAction && replyPlan.eventLinkAction !== "uncertain") {
        state.activeEventContext = buildActiveEventFromTurn(value, replyPlan, null);
        await persistDerivedState();
      }

      const recallPackage = buildPhotoRecallPackage(value);
      const recallCue = recallPackage?.cue || "";
      const healthCue = buildHealthSupportCue(value);
      if (!replyText) {
        playAiReply({
            text: `AI 服务暂时没有连上。请确认本机后端正在运行，并且 App 当前连接的是 ${getApiBaseUrl() || "正确的 API 地址"}。`,
          cue: recallCue
        });
        return;
      }

      maybeAppendRecalledPhoto(value);
      playAiReply({
        text: [healthCue, recallPackage ? recallPackage.question : "", replyText].filter(Boolean).join("\n\n"),
        cue: recallCue
      });

      window.setTimeout(async () => {
        const postReplyRetrieval = buildRetrievalContext(value);
        try {
          const userTurnCount = state.messages.filter((item) => item.type === "user").length;
          const shouldReviewConversation = userTurnCount >= 3;
          const [recap, profileInsightsPayload, lifeSummaryPayload, memoryReviewPayload] = await Promise.all([
            requestChatRecap(value, replyText, postReplyRetrieval).catch((error) => {
              console.error(error);
              return null;
            }),
            requestProfileInsights(value).catch((error) => {
              console.error(error);
              return null;
            }),
            requestLifeSummaryCompose().catch((error) => {
              console.error(error);
              return null;
            }),
            shouldReviewConversation
              ? requestMemoryReview().catch((error) => {
                  console.error(error);
                  return null;
                })
              : Promise.resolve(null)
          ]);

          if (recap) {
            state.lastChatRecap = recap;
          }

          if (profileInsightsPayload) {
            state.profileInsights = normalizeProfileInsights(profileInsightsPayload);
            state.personAliases = buildPersonAliasesFromState();
            await persistStateKey("profileInsights", state.profileInsights).catch((error) => console.error(error));
            await persistStateKey("personAliases", state.personAliases).catch((error) => console.error(error));
          }

          if (lifeSummaryPayload?.summaries) {
            state.lifeSummaries = Array.isArray(lifeSummaryPayload.summaries) ? lifeSummaryPayload.summaries : [];
            await persistStateKey("lifeSummaries", state.lifeSummaries).catch((error) => console.error(error));
          }

          if (memoryReviewPayload?.shouldRemind && memoryReviewPayload?.summary) {
            const reminderSignature = `${String(memoryReviewPayload.summary || "").trim()}__${String(memoryReviewPayload.sourceText || "").trim()}`;
            const alreadyConfirmed = state.confirmedFacts.some((item) => String(item.summary || "").trim() === String(memoryReviewPayload.summary || "").trim());
            const alreadyPending = state.memoryCandidates.some((item) => String(item.label || "").trim() === String(memoryReviewPayload.summary || "").trim());
            const shouldOpenReminder = reminderSignature
              && reminderSignature !== state.lastMemoryReminderSignature
              && !alreadyConfirmed
              && !alreadyPending;
            const reviewedEntry = mergeReviewedCandidate({
              summary: memoryReviewPayload.summary,
              sourceText: memoryReviewPayload.sourceText || memoryReviewPayload.summary,
              people: Array.isArray(memoryReviewPayload.people) ? memoryReviewPayload.people : [],
              timeLabel: memoryReviewPayload.timeLabel || "时间待补",
              createdAt: toIsoNow()
            });
            if (reviewedEntry && shouldOpenReminder) {
              state.lastMemoryReminderSignature = reminderSignature;
              await persistStateKey("memoryCandidates", state.memoryCandidates).catch((error) => console.error(error));
              renderPendingCues();
              logPipelineStep("candidate-modal-open", {
                candidateId: reviewedEntry.id,
                label: reviewedEntry.label
              });
              openSheet("candidateDecision", {
                candidateId: reviewedEntry.id,
                label: reviewedEntry.label,
                text: reviewedEntry.sourceText
              });
            } else if (reviewedEntry) {
              await persistStateKey("memoryCandidates", state.memoryCandidates).catch((error) => console.error(error));
            }
          }

          renderPendingCues();
          renderGraph();
          renderProfileSections();
          await persistChatState();
          await persistDerivedState();
          renderDrawer();
        } catch (error) {
          console.error(error);
          await persistChatState();
          renderProfileSections();
          renderDrawer();
        }
      }, 1700);
    }

    function browserSpeechRecognitionCtor() {
      return window.SpeechRecognition || window.webkitSpeechRecognition || null;
    }

    function getVoiceCaptureMode() {
      const plugin = getSpeechRecognitionPlugin();
      if (plugin?.start && plugin?.available) return "native";
      if (browserSpeechRecognitionCtor()) return "browser";
      return "draft";
    }

    async function stopVoiceInput(reason = "manual") {
      const plugin = getSpeechRecognitionPlugin();
      const recognition = state.voiceRecognition;
      let nativeStopResult = null;

      try {
        if (plugin?.stop && state.voiceInputMode === "native") {
          nativeStopResult = await plugin.stop();
        }
      } catch (error) {
        console.error(error);
      }

      try {
        if (recognition && state.voiceInputMode === "browser") {
          recognition.stop();
        }
      } catch (error) {
        console.error(error);
      }

      const stoppedText = Array.isArray(nativeStopResult?.matches)
        ? String(nativeStopResult.matches[0] || "").trim()
        : "";
      if (stoppedText) {
        applyVoiceTranscript(stoppedText, state.voiceInputTargetId || "chatInput");
      }

      state.voiceRecognition = null;
      await clearVoicePluginListeners();
      setVoiceState({
        listening: false,
        mode: reason === "error" ? "error" : "ready",
        error: reason === "error" ? state.voiceInputError : "",
        transcript: state.voiceTranscriptDraft,
        targetInputId: state.voiceInputTargetId
      });
      updateCompanionStatus("她正在听");
    }

    async function startNativeSpeechInput(targetInputId = "chatInput") {
      const plugin = getSpeechRecognitionPlugin();
      if (!plugin?.available || !plugin?.start) return false;

      try {
        await clearVoicePluginListeners();
        const availability = await plugin.available({ language: "zh-CN" });
        if (!availability?.available) {
          const draft = seedVoiceDraft(targetInputId);
          const reason = normalizeVoiceErrorMessage(availability?.reason || availability?.error || "系统语音识别当前不可用");
          setVoiceState({ listening: false, mode: "error", error: reason, targetInputId, transcript: draft });
          appendAiReply(`这次 iPhone 语音识别没有成功。${reason}。我先给你保留成文字草稿，你可以直接发出去：${draft}`);
          return true;
        }

        const permissionStatus = plugin.checkPermissions ? await plugin.checkPermissions() : null;
        const hasPermission = permissionStatus?.speechRecognition === "granted";
        if (!hasPermission && plugin.requestPermissions) {
          const requested = await plugin.requestPermissions();
          if (requested?.speechRecognition !== "granted") {
            const draft = seedVoiceDraft(targetInputId);
            setVoiceState({ listening: false, mode: "error", error: "还没有拿到语音识别权限", targetInputId, transcript: draft });
            appendAiReply(`还没有拿到语音识别权限。我先帮你落了一条可编辑草稿，你可以直接补一句再发出去：${draft}`);
            return true;
          }
        }

        if (plugin.addListener) {
          state.voiceListenerHandles.push(await plugin.addListener("partialResults", (data) => {
            const text = Array.isArray(data?.matches) ? String(data.matches[0] || "").trim() : "";
            if (text) {
              applyVoiceTranscript(text, targetInputId);
              setVoiceState({ listening: true, mode: "native", targetInputId, transcript: text });
            }
          }));
          state.voiceListenerHandles.push(await plugin.addListener("finalResult", (data) => {
            const text = Array.isArray(data?.matches) ? String(data.matches[0] || "").trim() : "";
            if (text) applyVoiceTranscript(text, targetInputId);
            void stopVoiceInput("final");
          }));
          state.voiceListenerHandles.push(await plugin.addListener("speechError", (data) => {
            const detail = [data?.message, data?.domain, data?.code].filter((item) => String(item || "").trim()).join(" | ");
            const reason = normalizeVoiceErrorMessage(detail);
            console.error("[voice:native:error]", data);
            const draft = seedVoiceDraft(targetInputId, state.voiceTranscriptDraft || buildVoiceDraftHint());
            setVoiceState({ listening: false, mode: "error", error: reason, targetInputId, transcript: draft });
            appendAiReply(`这次 iPhone 语音识别没有成功。${reason}。我先给你保留成文字草稿，你可以直接发出去：${draft}`);
            void stopVoiceInput("error");
          }));
          state.voiceListenerHandles.push(await plugin.addListener("listeningState", (data) => {
            const listening = data?.status === "started";
            const nextMode = listening ? "native" : (state.voiceInputMode === "error" ? "error" : "ready");
            setVoiceState({
              listening,
              mode: nextMode,
              error: state.voiceInputError,
              targetInputId,
              transcript: state.voiceTranscriptDraft
            });
            if (!listening) updateCompanionStatus("她正在听");
          }));
        }

        setVoiceState({ listening: true, mode: "native", error: "", targetInputId, transcript: "" });
        updateCompanionStatus("她正在听你说");

        const result = await plugin.start({
          language: "zh-CN",
          maxResults: 1,
          partialResults: true,
          popup: false,
          requiresOnDevice: false
        });

        const pluginError = String(result?.error || "").trim();
        if (pluginError) {
          const draft = seedVoiceDraft(targetInputId);
          setVoiceState({ listening: false, mode: "error", error: normalizeVoiceErrorMessage(pluginError), targetInputId, transcript: draft });
          appendAiReply(`这次 iPhone 语音识别没有成功。我先给你保留成文字草稿，你可以直接发出去：${draft}`);
          await stopVoiceInput("error");
          return true;
        }

        if (String(result?.status || "").trim() !== "started") {
          const draft = seedVoiceDraft(targetInputId);
          setVoiceState({ listening: false, mode: "error", error: "语音识别没有成功进入监听状态", targetInputId, transcript: draft });
          appendAiReply(`这次 iPhone 语音识别没有成功进入监听状态。我先给你保留成文字草稿，你可以直接发出去：${draft}`);
          await stopVoiceInput("error");
          return true;
        }

        return true;
      } catch (error) {
        console.error(error);
        const draft = seedVoiceDraft(targetInputId);
        setVoiceState({
          listening: false,
          mode: "error",
          error: normalizeVoiceErrorMessage(error?.message || "语音识别启动失败"),
          targetInputId,
          transcript: draft
        });
        await stopVoiceInput("error");
        appendAiReply(`这次 iPhone 语音识别没有成功。我先给你保留成文字草稿，你可以直接发出去：${draft}`);
        return true;
      }
    }

    async function startBrowserSpeechInput(targetInputId = "chatInput") {
      const Recognition = browserSpeechRecognitionCtor();
      if (!Recognition) return false;

      const recognition = new Recognition();
      state.voiceRecognition = recognition;
      recognition.lang = "zh-CN";
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      setVoiceState({ listening: true, mode: "browser", error: "", targetInputId, transcript: "" });
      updateCompanionStatus("她正在听你说");

      recognition.onresult = (event) => {
        const text = Array.from(event.results || [])
          .map((item) => item?.[0]?.transcript || "")
          .join("")
          .trim();
        if (text) applyVoiceTranscript(text, targetInputId);
      };
      recognition.onend = () => {
        state.voiceRecognition = null;
        void stopVoiceInput("final");
      };
      recognition.onerror = (event) => {
        console.error("[voice:browser:error]", event);
        const input = document.getElementById(targetInputId);
        if (input && !String(input.value || "").trim()) {
          input.value = buildVoiceDraftHint();
        }
        setVoiceState({
          listening: false,
          mode: "error",
          error: normalizeVoiceErrorMessage(event?.error || "浏览器语音识别失败"),
          targetInputId,
          transcript: String(input?.value || "").trim()
        });
        void stopVoiceInput("error");
        appendAiReply("语音输入这次没有成功，我先保留了文字草稿，你可以直接补一句再发。");
      };

      recognition.start();
      return true;
    }

    async function simulateVoiceInput(targetInputId = "chatInput") {
      if (window.speechSynthesis) {
        try {
          window.speechSynthesis.cancel();
        } catch (error) {
          console.error(error);
        }
      }

      if (state.voiceListening) {
        await stopVoiceInput("manual");
        return;
      }

      const nativeHandled = await startNativeSpeechInput(targetInputId);
      if (nativeHandled) return;

      const browserHandled = await startBrowserSpeechInput(targetInputId);
      if (browserHandled) return;

      const draft = seedVoiceDraft(targetInputId);
      setVoiceState({ listening: false, mode: "ready", error: "", targetInputId, transcript: draft });
      updateCompanionStatus("她正在听");
    }

    function maybeSpeak(text) {
      const settingsState = serverState.state?.settings || {};
      if (settingsState.voiceOutputEnabled !== true || !window.speechSynthesis || !text) return;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "zh-CN";
      utterance.rate = 0.95;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    function guessPhotoTag(caption = "") {
      const text = String(caption || "").trim();
      if (!text) return "照片线索";
      return text.split(/[，。,\s]/).find(Boolean) || "照片线索";
    }

    async function uploadPhotoRecord({ dataUrl, fileName = "", caption = "", source = "upload" }) {
      const response = await api("/api/photos", {
        method: "POST",
        body: JSON.stringify({
          dataUrl,
          fileName: fileName || `photo_${Date.now()}.png`,
          mimeType: dataUrl.match(/^data:(image\/[a-z0-9.+-]+);/i)?.[1] || "image/png",
          caption,
          personName: guessPhotoTag(caption),
          source
        })
      });
      if (!response.ok) {
        throw new Error(`photo upload failed:${response.status}`);
      }
      const payload = await response.json();
      return payload.photo;
    }

    async function refreshPhotoPermissions() {
      const camera = getCameraPlugin();
      if (!camera?.checkPermissions) {
        state.photoPermissionStatus = "浏览器模式";
        return state.photoPermissionStatus;
      }
      try {
        const permissions = await camera.checkPermissions();
        serverState.photoPermissions = permissions;
        state.photoPermissionStatus = normalizePhotoPermissionStatus(permissions);
        return state.photoPermissionStatus;
      } catch (error) {
        console.error(error);
        state.photoPermissionStatus = "检测失败";
        return state.photoPermissionStatus;
      }
    }

    async function ensurePhotoPermissions() {
      const camera = getCameraPlugin();
      if (!camera?.requestPermissions) {
        state.photoPermissionStatus = "浏览器模式";
        return true;
      }

      const current = await refreshPhotoPermissions();
      if (current === "已授权") return true;

      try {
        const permissions = await camera.requestPermissions({ permissions: ["photos"] });
        serverState.photoPermissions = permissions;
        state.photoPermissionStatus = normalizePhotoPermissionStatus(permissions);
        return state.photoPermissionStatus === "已授权";
      } catch (error) {
        console.error(error);
        state.photoPermissionStatus = "已拒绝";
        return false;
      }
    }

    async function refreshPhotosFromServer() {
      const response = await api("/api/photos");
      if (!response.ok) return;
      const payload = await response.json();
      serverState.photos = Array.isArray(payload.photos) ? payload.photos : [];
      state.photos = serverState.photos
        .slice()
        .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0))
        .map((item) => ({
          id: item.id,
          tag: item.personName || item.caption || "照片线索",
          note: item.createdAt ? new Date(item.createdAt).toLocaleString("zh-CN", { hour12: false }) : "待补时间",
          url: item.url ? `${getApiBaseUrl()}${item.url}` : "",
          caption: item.caption || ""
        }));
    }

        void pickPhotoFromNative(mode);

        };

    function shouldHideGraphFact(fact = {}) {
      const fingerprint = [
        fact.subject,
        fact.object,
        fact.canonicalLabel,
        ...(Array.isArray(fact.relatedPeople) ? fact.relatedPeople : []),
        fact.sourceText
      ].join(" ");
      return /(照片线索|这张照片|照片故事|上传照片|photo_story)/.test(String(fingerprint || ""));
    }

    function deriveGraphData() {
      const peopleMap = new Map();
      const eventsMap = new Map();
      const timelineMap = new Map();
      const placeMap = new Map();
      (Array.isArray(state.confirmedFacts) ? state.confirmedFacts : []).forEach((fact) => {
        if (shouldHideGraphFact(fact)) return;
        const canonicalLabel = String(fact.canonicalLabel || fact.label || fact.object || "").trim();
        if (!canonicalLabel) return;
        const subject = String(fact.subject || "").trim();
        const predicate = normalizeFactPredicate(fact.predicate || "提到");
        const people = uniqueStrings([subject, ...(fact.relatedPeople || [])].filter((item) => item && item !== "用户"), 6);
        const detail = String(fact.sourceText || fact.object || canonicalLabel).trim() || canonicalLabel;
        const timeLabels = Array.isArray(fact.timeLabels) && fact.timeLabels.length ? fact.timeLabels : ["时间待补"];
        const locations = Array.isArray(fact.locations) ? fact.locations : [];

        people.forEach((person) => {
          const entry = peopleMap.get(person) || { name: person, count: 0, memories: [] };
          entry.count += 1;
          entry.memories.push(canonicalLabel);
          peopleMap.set(person, entry);
        });

        const eventName = `${predicate}${fact.object ? `｜${fact.object}` : ""}` || canonicalLabel;
        const eventEntry = eventsMap.get(eventName) || { name: eventName, detail: "" };
        eventEntry.detail = `${eventEntry.detail ? `${eventEntry.detail}；` : ""}${detail}`;
        eventsMap.set(eventName, eventEntry);

        locations.forEach((place) => {
          const placeEntry = placeMap.get(place) || { name: place, count: 0, details: [] };
          placeEntry.count += 1;
          placeEntry.details.push(canonicalLabel);
          placeMap.set(place, placeEntry);
        });

        timeLabels.forEach((label) => {
          const bucket = timelineMap.get(label) || { year: label, titles: [] };
          bucket.titles.push(canonicalLabel);
          timelineMap.set(label, bucket);
        });
      });

      const people = [...peopleMap.values()]
        .map((item) => ({
          ...item,
          memories: uniqueStrings(item.memories, 6)
        }))
        .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name, "zh-CN"));
      const events = [...eventsMap.values()].map((item) => ({
        name: item.name,
        detail: compactText(item.detail, 36) || "这条事件还在慢慢补全。"
      })).sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
      const places = [...placeMap.values()]
        .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name, "zh-CN"))
        .map((item) => ({
          name: item.name,
          count: item.count,
          detail: item.details.slice(0, 2).join("、") || "这里的线索还不够。"
        }));
      const timeline = [...timelineMap.values()]
        .sort((a, b) => String(b.year).localeCompare(String(a.year), "zh-CN"))
        .map((item) => ({
          year: item.year,
          title: item.titles[0] || "这段记忆还在补全",
          detail: uniqueStrings(item.titles, 3).join("、")
        }));

      return { people, events, places, timeline };
    }

function renderGraph() {
      const derived = deriveGraphData();
      state.people = derived.people;
      state.events = derived.events;
      state.places = derived.places;
      state.timeline = derived.timeline;
      if (state.selectedPerson && !state.people.some((item) => item.name === state.selectedPerson)) {
        state.selectedPerson = "";
      }
      renderPeople();
      renderEvents();
      renderPersonMemories();
      renderTimeline();
      renderPlaces();
    }

    function openSheet(type, payload = {}) {
      state.activeSheet = type;
      const overlay = document.getElementById("modalOverlay");
      const sheet = document.getElementById("sheetModal");
      const kicker = document.getElementById("sheetKicker");
      const title = document.getElementById("sheetTitle");
      const body = document.getElementById("sheetBody");

      if (type === "candidateDecision") {
        const candidate = payload.candidateId
          ? state.memoryCandidates.find((item) => item.id === payload.candidateId)
          : null;
        const normalized = normalizePendingCueItem(candidate || payload || {});
        const isReviewedReminder = candidate?.type === "reviewed";
        const isMergeSuggestion = candidate?.type === "merge_suggestion";
        kicker.textContent = "温伴";
        title.textContent = isMergeSuggestion ? "确认是否合并事实" : "确认一条候选记忆";
        body.innerHTML = `
          <div class="sheet-setting-card">
            <strong>${escapeHtml(normalized.label || "这条线索值得收一下")}</strong>
            <p class="graph-description" style="margin-top:8px;">${escapeHtml(normalized.sourceText || payload.text || "我先帮你挂住了这条线索。")}</p>
            <p class="graph-description" style="margin-top:8px;">${isMergeSuggestion ? `系统觉得它可能和已有事实是一条，原因：${escapeHtml(candidate?.mergeReason || "语义相近")}。你确认后再合并。` : (isReviewedReminder ? "这条总结值得先提醒你确认。你可以稍后整理，或直接收录。" : "确认后会直接收进忆光，并同步到记忆图谱。")}</p>
          </div>
          <div class="sheet-actions">
            <button type="button" class="sheet-secondary" id="candidateLaterBtn">${isReviewedReminder ? "稍后整理" : "一会儿再说"}</button>
            <button type="button" class="sheet-primary" id="candidateNowBtn">${isMergeSuggestion ? "确认合并" : "直接收录"}</button>
          </div>
        `;
        body.querySelector("#candidateLaterBtn").addEventListener("click", async () => {
          if (normalized.id) {
            deferCandidate(normalized.id);
            await persistDerivedState();
          }
          closeSheet();
          state.pendingOpen = true;
          document.getElementById("pendingList").classList.add("open");
        });
        body.querySelector("#candidateNowBtn").addEventListener("click", async () => {
          const primaryBtn = body.querySelector("#candidateNowBtn");
          if (primaryBtn) {
            primaryBtn.disabled = true;
            primaryBtn.textContent = isMergeSuggestion ? "正在合并..." : "正在收录...";
          }
          if (isMergeSuggestion && candidate) {
            try {
              const payload = await requestConfirmCandidate(candidate.id, candidate.sourceText || candidate.label || "");
              applyConfirmedFactsState(payload);
              removePendingCandidate(candidate.id);
              state.lastMemoryReminderSignature = `${String(candidate.label || "").trim()}__${String(candidate.sourceText || "").trim()}`;
              renderPendingCues();
              renderGraph();
              renderProfileSections();
              await syncConfirmedKnowledge();
              await persistDerivedState();
              closeSheet();
              return;
            } catch (error) {
              console.error(error);
              if (primaryBtn) {
                primaryBtn.disabled = false;
                primaryBtn.textContent = "确认合并";
              }
            }
          }
          if (!candidate) return;
          try {
            closeSheet();
            confirmCandidateIntoMemory(candidate, normalized.sourceText || payload.text || "").catch((error) => {
              console.error(error);
              appendAiReply("这条记忆刚才没收进去，我先把线索留住了。你可以再点一次，或者先去忆光里手动整理。");
            });
            state.lastMemoryReminderSignature = `${String(candidate.label || "").trim()}__${String(candidate.sourceText || "").trim()}`;
          } catch (error) {
            console.error(error);
            appendAiReply("这条记忆刚才没收进去，我先把线索留住了。你可以再点一次，或者先去忆光里手动整理。");
            if (primaryBtn) {
              primaryBtn.disabled = false;
              primaryBtn.textContent = "直接收录";
            }
          }
        });
      }

      if (type === "memory") {
        kicker.textContent = "忆光";
        title.textContent = "写下一页";
        body.innerHTML = `
          <textarea class="sheet-textarea" id="sheetMemoryInput" placeholder="比如：今天在公园碰到老张，又想起年轻时候的事。">${escapeHtml(payload.text || "")}</textarea>

            }
            const card = buildMemoryCardFromStructured({
              ...structured,
              content: draft.content || value,
              summary: structured.summary || draft.summary,
              mood: structured.mood || draft.mood,
              title: structured.title || draft.title,
              linkedFactId: confirmedFactId

              content: draft.content || value,

              title: draft.title,

    function renderTimeline() {
      const root = document.getElementById("timelineList");
      const granularities = [
        { key: "year", label: "年" },
        { key: "month", label: "月" },
        { key: "day", label: "日" }
      ];
      const normalizeTimelineKey = (value = "", granularity = "day") => {
        const raw = String(value || "").trim();
        const numeric = raw.match(/(20\d{2})[-年]?(\d{1,2})?[-月]?(\d{1,2})?/);
        if (numeric) {
          const year = numeric[1];
          const month = numeric[2] ? String(numeric[2]).padStart(2, "0") : "";
          const day = numeric[3] ? String(numeric[3]).padStart(2, "0") : "";
          if (granularity === "year") return `${year}年`;
          if (granularity === "month") return month ? `${year}年${month}月` : `${year}年`;
          if (granularity === "day") return day ? `${year}-${month}-${day}` : (month ? `${year}年${month}月` : `${year}年`);
        }
        if (granularity === "year") return raw.slice(0, 4) ? `${raw.slice(0, 4)}年` : raw;
        return raw;
      };
      const grouped = new Map();
      state.timeline.forEach((item) => {
        const key = normalizeTimelineKey(item.year, state.timelineGranularity);
        const bucket = grouped.get(key) || {
          year: key,
          title: item.title,
          detail: item.detail,
          importance: 0
        };
        const itemImportance = Number(String(item.detail || "").match(/重要度\s*(\d+)/)?.[1] || 0);
        const bucketImportance = Number(String(bucket.detail || "").match(/重要度\s*(\d+)/)?.[1] || 0);
        if (itemImportance >= bucketImportance) {
          bucket.title = item.title;
          bucket.detail = item.detail;
          bucket.importance = itemImportance;
        }
        grouped.set(key, bucket);
      });
      const items = [...grouped.values()].sort((a, b) => String(b.year).localeCompare(String(a.year), "zh-CN"));
      root.innerHTML = `
        <div class="timeline-controls">
          ${granularities.map((item) => `
            <button type="button" class="timeline-chip ${state.timelineGranularity === item.key ? "active" : ""}" data-timeline-granularity="${item.key}">
              ${item.label}
            </button>
          `).join("")}
        </div>
        ${items.map((item) => `
        <div class="timeline-row">
          <div class="timeline-track">
            <div class="timeline-year">${escapeHtml(item.year)}</div>
          </div>
          <div class="timeline-item">
            <strong>${escapeHtml(item.title)}</strong>
            <span>${escapeHtml(item.detail)}</span>
          </div>
        </div>
        `).join("")}
      `;
      root.querySelectorAll("[data-timeline-granularity]").forEach((button) => {
        button.addEventListener("click", () => {
          state.timelineGranularity = button.dataset.timelineGranularity;
          renderTimeline();
        });
      });
    }

    function applyServerData(payload = {}) {
      const rawState = payload.state || {};
      serverState.state = rawState;

      if (Array.isArray(rawState.conversations) && rawState.conversations.length) {
        state.conversations = rawState.conversations.map((item, index) => normalizeConversation(item, index));
        state.activeConversationId = String(rawState.activeConversationId || state.activeConversationId || state.conversations[0]?.id || "").trim();
        syncLegacyChatStateFromConversations();
      } else if (Array.isArray(rawState.chat) && rawState.chat.length) {
        state.conversations = [
          normalizeConversation({
            id: state.activeConversationId || "conversation_latest",
            title: summarizeThreadMessages(rawState.chat).title,
            subtitle: summarizeThreadMessages(rawState.chat).subtitle,
            messages: rawState.chat,
            updatedAt: rawState.chat[rawState.chat.length - 1]?.createdAt || toIsoNow()
          })
        ];
        state.activeConversationId = state.conversations[0].id;
        syncLegacyChatStateFromConversations();
      }

      const activeConversation = getActiveConversation();
      if (activeConversation) {
        state.messages = activeConversation.messages.map((item) => normalizeChatMessage(item)).filter((item) => item.text || item.type === "cue");
      }

      if (Array.isArray(rawState.memories) && rawState.memories.length) {
        state.memoryCards = rawState.memories.map(normalizeMemoryCard);
      }

      state.activeEventContext = rawState.activeEventContext || state.activeEventContext || null;
      state.revisionLogs = Array.isArray(rawState.revisionLogs) ? rawState.revisionLogs : state.revisionLogs;
      state.memoryCandidates = Array.isArray(rawState.memoryCandidates)
        ? rawState.memoryCandidates.map((item) => ({
            ...normalizePendingCueItem(item),
            candidate: item?.candidate || item
          }))
        : state.memoryCandidates;
      state.pendingCues = state.memoryCandidates.length
        ? state.memoryCandidates.slice(0, 10).map((item) => normalizePendingCueItem(item))
        : state.pendingCues.map((item) => normalizePendingCueItem(item));
      state.strategyTrail = Array.isArray(rawState.strategyTrail) ? rawState.strategyTrail : state.strategyTrail;
      state.lastChatRecap = rawState.lastChatRecap || state.lastChatRecap || null;
      state.lifeSummaries = Array.isArray(rawState.lifeSummaries) ? rawState.lifeSummaries : state.lifeSummaries;
      state.profileInsights = rawState.profileInsights ? normalizeProfileInsights(rawState.profileInsights) : state.profileInsights;
      state.healthProfile = rawState.healthProfile ? normalizeHealthProfile(rawState.healthProfile) : state.healthProfile;
      state.confirmedFacts = Array.isArray(rawState.confirmedFacts) ? rawState.confirmedFacts : state.confirmedFacts;
      state.personAliases = Array.isArray(rawState.personAliases) ? rawState.personAliases : state.personAliases;
      if (state.profileInsights) {
        state.personAliases = buildPersonAliasesFromState();
      }
      state.factDatabase = Array.isArray(rawState.factDatabase) && rawState.factDatabase.length
        ? rawState.factDatabase
        : buildFactDatabaseFromConfirmedFacts();

      const settingsState = rawState.settings || {};
      const profileState = rawState.profile || {};
      const companionName = String(settingsState.companionName || "温伴").trim();
      document.documentElement.style.setProperty("--app-font-size", String(settingsState.fontSize || "17px").trim());

      state.settings = [
        { label: "后端地址", value: getApiBaseUrl() || "未设置", type: "text" },
        { label: "陪伴名字", value: companionName, type: "text" },
        { label: "说话方式", value: String(profileState.tone || "像懂你的晚辈").trim() || "像懂你的晚辈", type: "text" },
        { label: "字体大小", value: String(settingsState.fontSize || "17px").trim(), type: "text" },
        { label: "语音播报", value: settingsState.voiceOutputEnabled === true ? "已开启" : "已关闭", type: "toggle" },
        { label: "照片权限", value: state.photoPermissionStatus, type: "text" },
        { label: "后端连通", value: getApiHealthLabel(), type: "text" },
        { label: "记忆图谱入口", value: `${state.memoryCards.length} 页 / ${state.photos.length} 张照片`, type: "text" }
      ];
      renderChrome();
      renderPendingCues();
      renderProfileSections();
    }

    async function hydrateServerData() {
      const bootstrapPayload = {
        chat: state.messages.length ? state.messages : cloneMessages(state.activeChatKey),
        conversations: state.conversations.length ? state.conversations : migrateLegacyConversations(),
        activeConversationId: state.activeConversationId || state.conversations[0]?.id || "today",
        memories: state.memoryCards.map(serializeMemoryCard),
        settings: {
          companionName: "温伴",
          fontSize: "17px",
          accent: "#c76645",
          voiceInputMode: "browser",
          voiceOutputEnabled: false,
          autoSpeakReply: false,
          autoSendVoiceInput: false
        },
        profile: {
          name: "李阿姨",
          tone: "像懂自己的晚辈，轻一点，慢一点"
        },
        healthProfile: state.healthProfile
      };

      try {
        await api("/api/state/bootstrap", {
          method: "POST",
          body: JSON.stringify({ state: bootstrapPayload })
        });
      } catch (error) {
        console.error(error);
      }

      const [stateRes, photosRes, voiceRes, avatarRes, userCardRes] = await Promise.allSettled([
        api("/api/state"),
        api("/api/photos"),
        api("/api/voice/capabilities"),
        api("/api/avatar"),
        api("/api/user-card")
      ]);

      if (stateRes.status === "fulfilled" && stateRes.value.ok) {
        applyServerData(await stateRes.value.json());
      }

      if (photosRes.status === "fulfilled" && photosRes.value.ok) {
        await refreshPhotosFromServer();
      }

      await refreshPhotoPermissions();

      if (voiceRes.status === "fulfilled" && voiceRes.value.ok) {
        serverState.voiceCapabilities = await voiceRes.value.json();
        const tts = serverState.voiceCapabilities?.tts;
        const setting = state.settings.find((item) => item.label === "语音播报");
        if (setting) {
          setting.value = tts?.remoteConfigured ? "远端可用" : (tts?.browserFallback ? "浏览器可用" : "未配置");
        }
      }

      if (avatarRes.status === "fulfilled" && avatarRes.value.ok) {
        const payload = await avatarRes.value.json();
        serverState.avatar = payload.avatar || null;
      }

      if (userCardRes.status === "fulfilled" && userCardRes.value.ok) {
        const payload = await userCardRes.value.json();
        serverState.userCard = payload.userCard || null;
      }

      const backendReachable = [stateRes, photosRes, voiceRes, avatarRes, userCardRes].some(
        (item) => item.status === "fulfilled" && item.value.ok
      );
      setApiHealthLabel(backendReachable ? "已连通" : "连接失败");

      applyServerData({ state: serverState.state || bootstrapPayload });
    }

    async function requestAiReply(text, replyPlan = {}, retrieval = {}) {
      const now = new Date();
      const recentMessages = state.messages.slice(-6).map((item) => ({
        role: item.type === "user" ? "user" : "assistant",
        content: item.text || ""
      }));
      const health = normalizeHealthProfile(state.healthProfile);
      const medicationReminders = buildMedicationReminderList(health, now);
      const healthSummary = buildHealthProfileSummary(health);
      const recalledPhotos = matchPhotosForRecall(text);
      const relatedPhotos = recalledPhotos.map((photo) => `${photo.tag}｜${photo.note}${photo.caption ? `｜${photo.caption}` : ""}`);
      const response = await api("/api/ai", {
        method: "POST",
        body: JSON.stringify({
          messages: [
            {
              role: "system",
              content: [
                "你是一个面向老年用户的中文记忆陪伴助手。",
                "回复要短、自然、温和，像懂用户的晚辈。",
                "不要使用括号说明，不要写舞台提示，不要角色表演。",
                "如果用户身体不舒服、记性变差、或者到了已知的服药时间，可以自然多关心一句，但不要装医生，也不要吓人。",
                "如果需要健康建议，只能给生活化、保守的提醒；一旦涉及严重不适，要明确建议就医。",
                `当前绝对时间：${now.toLocaleString("zh-CN", { hour12: false })}。`,
                "如果用户提到今天、昨天、去年、春节等相对时间，要基于当前绝对时间理解，不要假装不知道现在是什么时候。",
                "如果提供了相关照片线索，可以自然提到，但不要编造照片里没有出现的细节。",
                "如果已经召回了一张相关照片，可以顺着这张照片问一个非常具体的小问题，帮助用户继续回忆。",
                `本轮回复策略：${replyPlan.replyStrategy || "continue_event"}。`,
                `本轮回复目标：${replyPlan.replyGoal || "先轻轻接住用户这句话"}。`,
                `本轮自我判断：${replyPlan.selfJudgment || "保持自然、克制、不过度追问"}。`,
                `已知健康画像：${healthSummary}。`,
                medicationReminders.length ? `当前接近的服药提醒：${medicationReminders.map((item) => `${item.time} ${item.name}`).join("；")}。` : "当前没有接近的服药提醒。",
                replyPlan.confirmationPrompt ? `若需要确认，可参考这句：${replyPlan.confirmationPrompt}` : "",
                retrieval.activeEvent?.summary ? `当前活跃事件：${retrieval.activeEvent.summary}` : ""
              ].join("\n")
            },
            ...recentMessages,
            {
              role: "user",
              content: [
                `用户当前输入：${text}`,
                `时间理解提示：${inferTimeIntent(text) || "无明显相对时间词"}`,
                `相关照片线索：${relatedPhotos.length ? relatedPhotos.join("；") : "暂无"}`,
                `是否已召回照片：${recalledPhotos.length ? "是" : "否"}`,
                `是否应避免强行回忆：${replyPlan.shouldAvoidMemoryRecall ? "是" : "否"}`
              ].join("\n")
            }
          ]
        })
      });

      if (!response.ok) {
        throw new Error("ai reply failed");
      }

      const payload = await response.json();
      return String(payload?.choices?.[0]?.message?.content || "").trim();
    }

    const panelMap = {
      chat: "panelChat",
      book: "panelMemory",
      graph: "panelGraph",
      profile: "panelProfile"
    };

    function switchTab(tab) {
      state.activeTab = tab;
      document.querySelectorAll(".page").forEach((page) => {
        const active = page.dataset.page === tab;
        page.classList.toggle("active", active);
        page.setAttribute("aria-hidden", active ? "false" : "true");
      });
      document.querySelectorAll(".tab-item").forEach((item) => {
        item.classList.toggle("active", item.dataset.tab === tab);
        item.setAttribute("aria-selected", item.dataset.tab === tab ? "true" : "false");
      });
      console.log("switchTab ->", tab, panelMap[tab]);
    }

    function renderDrawer() {
      const root = document.getElementById("historyDrawerList");
      ensureConversationState();
      const groupedThreads = state.conversations.reduce((acc, item) => {
        const key = getConversationGroupTitle(item.updatedAt);
        if (!acc[key]) acc[key] = [];
        const preview = getConversationPreviewText(item);
        acc[key].push({
          key: item.id,
          title: item.title,
          subtitle: item.subtitle,
          updatedAt: item.updatedAt,
          preview
        });
        return acc;
      }, {});
      root.innerHTML = Object.entries(groupedThreads).map(([title, items]) => `
        <section class="history-group">
          <div class="history-group-title">${title}</div>
          ${items.map((item) => `
            <button type="button" class="history-item ${item.key === state.activeConversationId ? "active" : ""}" data-chat-key="${item.key}">
              <strong>${item.title}</strong>
              <span>${escapeHtml(compactText(item.preview || item.subtitle, 30) || "暂无预览")}</span>
              <div class="history-meta">${escapeHtml(formatRelativeUpdateTime(item.updatedAt))}</div>
              <div class="history-actions">
                <span class="history-rename" data-rename-chat="${item.key}">改名</span>
              </div>
            </button>
          `).join("")}
        </section>
      `).join("");

      root.querySelectorAll("[data-chat-key]").forEach((button) => {
        button.addEventListener("click", async () => {
          switchConversation(button.dataset.chatKey);
          renderChat();
          renderDrawer();
          await persistChatState();
          closeDrawer();
        });
      });

      root.querySelectorAll("[data-rename-chat]").forEach((button) => {
        button.addEventListener("click", async (event) => {
          event.stopPropagation();
          const conversationId = button.dataset.renameChat;
          const conversation = state.conversations.find((item) => item.id === conversationId);
          if (!conversation) return;
          const nextTitle = window.prompt("修改会话标题", conversation.title || "") || "";
          const normalized = String(nextTitle || "").trim();
          if (!normalized) return;
          conversation.title = normalized;
          syncLegacyChatStateFromConversations();
          renderDrawer();
          await persistChatState();
        });
      });
    }

    function openDrawer() {
      state.drawerOpen = true;
      document.getElementById("historyDrawer").classList.add("open");
      document.getElementById("drawerOverlay").classList.add("open");
      document.getElementById("historyDrawer").setAttribute("aria-hidden", "false");
    }

    function closeDrawer() {
      state.drawerOpen = false;
      document.getElementById("historyDrawer").classList.remove("open");
      document.getElementById("drawerOverlay").classList.remove("open");
      document.getElementById("historyDrawer").setAttribute("aria-hidden", "true");
    }

    function bindEvents() {
      if (state.eventsBound) return;
      state.eventsBound = true;
      document.getElementById("sendBtn").addEventListener("click", sendTextMessage);
      document.getElementById("chatInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          sendTextMessage();
        }
      });

      document.getElementById("voiceBtn").addEventListener("click", async () => {
        if (state.voiceListening) {
          await stopVoiceInput("manual");
          return;
        }
        openSheet("voice");
      });
      document.getElementById("photoBtn").addEventListener("click", () => pickPhoto("chat"));
      document.getElementById("plusBtn").addEventListener("click", togglePlusPanel);
      document.querySelectorAll("[data-plus-action]").forEach((button) => {
        button.addEventListener("click", () => simulatePlusAction(button.dataset.plusAction));
      });

      document.querySelectorAll(".tab-item").forEach((button) => {
        button.addEventListener("click", () => switchTab(button.dataset.tab));
      });

      document.getElementById("openDrawerBtn").addEventListener("click", openDrawer);
      document.getElementById("newChatBtn").addEventListener("click", startNewChat);
      document.getElementById("closeDrawerBtn").addEventListener("click", closeDrawer);
      document.getElementById("drawerOverlay").addEventListener("click", closeDrawer);
      document.getElementById("toggleMemoryInputBtn").addEventListener("click", () => openSheet("memory"));
      document.getElementById("togglePendingBtn").addEventListener("click", togglePendingList);
      document.getElementById("bookPhotoBtn").addEventListener("click", () => openSheet("photo"));

      document.querySelectorAll(".graph-switch").forEach((button) => {
        button.addEventListener("click", () => switchGraphView(button.dataset.graphView));
      });
      document.getElementById("closeSheetBtn").addEventListener("click", closeSheet);
      document.getElementById("modalOverlay").addEventListener("click", closeSheet);
      document.getElementById("photoPickerInput").addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        try {
          await handlePickedPhoto(file);
        } catch (error) {
          console.error(error);
        }
      });

      document.addEventListener("dblclick", (event) => {
        event.preventDefault();
      }, { passive: false });
    }

    async function init() {
      setClock();
      window.setInterval(setClock, 60000);
      const apiBaseUrl = getApiBaseUrl();
      initMessages();
      bootstrapChatThreads();
      renderChat();
      renderBookCards();
      renderPendingCues();
      renderGraph();
      renderSettings();
      renderDrawer();
      renderChrome();
      renderProfileSections();
      bindEvents();
      if (!apiBaseUrl) {
        setApiHealthLabel("未设置");
        appendAiReply("当前这版 App 还没有写入后端地址。你可以去“我的 -> 后端地址”里直接填入电脑上的后端地址，不需要重新打包。");
      } else {
        try {
          await probeApiBaseUrl(apiBaseUrl, 2500);
          setApiHealthLabel("已连通");
        } catch (error) {
          console.error(error);
          setApiHealthLabel("连接失败");
          appendAiReply(`当前保存的后端地址是 ${apiBaseUrl}，但现在没有连通。你可以去“我的 -> 后端地址”里重新测试或改掉它。`);
        }
      }
      try {
        await hydrateServerData();
        renderChat();
        renderBookCards();
        renderPendingCues();
        renderGraph();
        renderSettings();
        renderDrawer();
        renderChrome();
        renderProfileSections();
      } catch (error) {
        console.error("hydrate failed", error);
      }
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
