<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>温伴忆光 Demo</title>
  <style>
    :root {
      --bg: #f5f0ea;
      --panel: #ffffff;
      --soft: #ede7dc;
      --line: #d7cdbf;
      --text: #3f3a36;
      --muted: #8a7f76;
      --brand: #8b6f5e;
      --brand-deep: #745848;
      --app-font-size: 17px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
    }

    body {
      touch-action: manipulation;
      overscroll-behavior: none;
      user-select: none;
      font-size: var(--app-font-size);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      color: inherit;
      padding: 0;
      cursor: pointer;
    }

    input,
    textarea {
      min-width: 0;
      outline: none;
      border: 0;
      background: none;
      color: inherit;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      margin: 0 auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .status-bar {
      height: calc(12px + var(--safe-top));
      padding: calc(4px + var(--safe-top)) 12px 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-shrink: 0;
      font-size: 12px;
      color: var(--text);
      opacity: 0.72;
    }

    .status-icons {
      display: none;
    }

    .status-icons span {
      width: 4px;
      background: var(--brand);
      border-radius: 999px;
    }

    .status-icons span:nth-child(1) { height: 8px; opacity: 0.45; }
    .status-icons span:nth-child(2) { height: 11px; opacity: 0.7; }
    .status-icons span:nth-child(3) { height: 14px; }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-content {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .page {
      display: none;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .page.active {
      display: flex;
      flex-direction: column;
    }

    .page-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 8px 14px 10px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }

    .page-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
      font-weight: 600;
    }

    .page-subtitle,
    .meta-text,
    .section-kicker,
    .card-date,
    .timeline-year,
    .history-group-title {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .chat-top {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .chat-title-block {
      min-width: 0;
      padding: 10px 14px;
      border-radius: 18px;
      background: var(--brand);
      color: #fff;
    }

    .chat-title-block .page-title,
    .chat-title-block .page-subtitle {
      color: #fff;
    }

    .chat-title-block .page-subtitle {
      opacity: 0.82;
    }

    .avatar-pulse {
      position: relative;
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }

    .avatar-pulse::before,
    .avatar-pulse::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(139, 111, 94, 0.35);
      animation: pulse 2.2s infinite;
    }

    .avatar-pulse::after {
      animation-delay: 1s;
    }

    .avatar-pulse.listening::before,
    .avatar-pulse.listening::after {
      border-color: rgba(202, 77, 77, 0.34);
      animation-duration: 1.2s;
    }

    .avatar-core {
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      background: var(--brand);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 600;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.9);
        opacity: 0.85;
      }
      100% {
        transform: scale(1.35);
        opacity: 0;
      }
    }

    .header-side {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .icon-btn,
    .mini-btn,
    .chip-btn,
    .segment-btn,
    .tab-item,
    .expand-action,
    .input-icon,
    .drawer-toggle,
    .plus-item,
    .small-link,
    .graph-switch,
    .settings-link {
      border-radius: 24px;
    }

    .icon-btn,
    .drawer-toggle {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      background: var(--soft);
      color: var(--brand);
      font-size: 16px;
      flex-shrink: 0;
    }

    .drawer-toggle {
      margin-right: 4px;
    }

    .chat-scroll,
    .memory-scroll,
    .graph-scroll,
    .profile-scroll,
    .drawer-scroll,
    .book-card-list,
    .book-side-scroll,
    .person-memory-list,
    .photo-grid {
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .chat-scroll::-webkit-scrollbar,
    .memory-scroll::-webkit-scrollbar,
    .graph-scroll::-webkit-scrollbar,
    .profile-scroll::-webkit-scrollbar,
    .drawer-scroll::-webkit-scrollbar,
    .book-card-list::-webkit-scrollbar,
    .book-side-scroll::-webkit-scrollbar,
    .person-memory-list::-webkit-scrollbar,
    .photo-grid::-webkit-scrollbar {
      display: none;
    }

    .chat-layout {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-scroll {
      flex: 1;
      min-height: 0;
      padding: 14px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg-row.user {
      align-items: flex-end;
    }

    .msg-row.ai {
      align-items: flex-start;
    }

    .msg-head {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .mini-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--soft);
      color: var(--brand);
      display: grid;
      place-items: center;
      font-size: 11px;
      flex-shrink: 0;
    }

    .bubble {
      max-width: 82%;
      padding: 14px 16px;
      border-radius: 20px;
      font-size: var(--app-font-size);
      line-height: 1.6;
      word-break: break-word;
    }

    .msg-row.user .bubble {
      background: var(--brand);
      color: #fff;
    }

    .msg-row.ai .bubble {
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
    }

    .image-bubble {
      padding: 8px;
    }

    .image-bubble .photo-placeholder {
      width: 150px;
      height: 120px;
      border-radius: 16px;
      background: linear-gradient(135deg, #d8cab8, #f0e8dc);
      border: 1px solid var(--line);
      display: flex;
      align-items: flex-end;
      padding: 10px;
      color: var(--brand);
      font-size: 13px;
      line-height: 1.4;
    }

    .memory-cue {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 12px;
      border-left: 1px dashed var(--brand);
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .cue-text {
      flex: 1;
      min-width: 0;
    }

    .cue-fix {
      flex-shrink: 0;
      min-height: 28px;
      padding: 0 12px;
      background: var(--soft);
      color: var(--brand);
      font-size: 13px;
    }

    .typing-wrap {
      display: flex;
      gap: 5px;
      align-items: center;
      min-height: 20px;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #b9aea4;
      animation: bounce 1.1s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.45; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    .composer {
      position: relative;
      flex-shrink: 0;
      padding: 8px 10px 8px;
      border-top: 1px solid var(--line);
      background: var(--bg);
    }

    .expand-panel {
      display: none;
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .expand-panel.open {
      display: grid;
    }

    .plus-item {
      min-height: 38px;
      padding: 0 12px;
      background: var(--soft);
      color: var(--brand);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .composer-row {
      display: grid;
      grid-template-columns: 38px 1fr 38px 38px 48px;
      gap: 6px;
      align-items: center;
    }

    .input-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      background: var(--soft);
      color: var(--brand);
      font-size: 18px;
      flex-shrink: 0;
    }

    .input-icon.listening {
      background: #f7d9d9;
      color: #b04f4f;
      box-shadow: 0 0 0 4px rgba(176, 79, 79, 0.12);
    }

    .voice-status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      margin-top: 10px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #f6efe6;
      color: var(--brand);
      font-size: 14px;
      line-height: 1.4;
    }

    .voice-status-pill.listening {
      background: #fbe7e7;
      color: #a34b4b;
    }

    .voice-status-pill.error {
      background: #f9ece2;
      color: #9a5f2f;
    }

    .voice-meter {
      display: inline-flex;
      align-items: flex-end;
      gap: 3px;
      height: 14px;
    }

    .voice-meter span {
      width: 4px;
      height: 5px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.35;
      transform-origin: bottom center;
    }

    .voice-status-pill.listening .voice-meter span {
      animation: voiceBars 0.9s infinite ease-in-out;
      opacity: 0.9;
    }

    .voice-status-pill.listening .voice-meter span:nth-child(2) {
      animation-delay: 0.12s;
    }

    .voice-status-pill.listening .voice-meter span:nth-child(3) {
      animation-delay: 0.24s;
    }

    @keyframes voiceBars {
      0%, 100% { transform: scaleY(0.45); }
      50% { transform: scaleY(1.6); }
    }

    .chat-input {
      height: 38px;
      border-radius: 24px;
      padding: 0 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      font-size: var(--app-font-size);
    }

    .send-btn {
      height: 38px;
      border-radius: 24px;
      background: var(--brand);
      color: #fff;
      font-size: 14px;
      flex-shrink: 0;
    }

    .book-layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 31% 69%;
      overflow: hidden;
    }

    .book-side {
      min-width: 0;
      border-right: 1px solid var(--line);
      padding: 12px 10px 12px 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      gap: 10px;
    }

    .book-side-scroll {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 2px;
    }

    .book-main {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 12px 12px 12px 10px;
      gap: 10px;
    }

    .stack-card,
    .memory-card,
    .person-card,
    .timeline-card,
    .event-card,
    .settings-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    .stack-card {
      padding: 12px;
    }

    .stack-btn {
      width: 100%;
      min-height: 46px;
      border-radius: 24px;
      background: var(--brand);
      color: #fff;
      font-size: 15px;
      margin-top: 8px;
    }

    .secondary-btn {
      width: 100%;
      min-height: 46px;
      border-radius: 24px;
      background: var(--soft);
      color: var(--brand);
      font-size: 15px;
    }

    .inline-input {
      width: 100%;
      min-height: 84px;
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--bg);
      border: 1px solid var(--line);
      resize: none;
      font-size: 15px;
      line-height: 1.6;
    }

    .small-link {
      width: 100%;
      min-height: 42px;
      background: var(--soft);
      color: var(--brand);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pending-list {
      display: none;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
      flex-direction: column;
      gap: 8px;
    }

    .pending-list.open {
      display: flex;
    }

    .pending-item {
      padding: 9px 10px;
      border-radius: 12px;
      background: var(--bg);
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
    }

    .search-box {
      flex-shrink: 0;
      height: 42px;
      border-radius: 24px;
      padding: 0 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      font-size: 15px;
    }

    .book-card-list,
    .graph-scroll,
    .profile-scroll {
      flex: 1;
      min-height: 0;
    }

    .book-card-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 2px;
    }

    .memory-card {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-text {
      font-size: var(--app-font-size);
      line-height: 1.65;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--brand);
      font-size: 13px;
      line-height: 1.4;
    }

    .fix-link {
      min-height: 28px;
      padding: 0 10px;
      background: var(--soft);
      color: var(--brand);
      font-size: 13px;
      flex-shrink: 0;
    }

    .card-detail {
      display: none;
      padding-top: 8px;
      border-top: 1px solid var(--line);
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
    }

    .memory-card.open .card-detail {
      display: block;
    }

    .graph-layout,
    .profile-layout {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .graph-topbar {
      flex-shrink: 0;
      padding: 12px 12px 10px;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      touch-action: pan-x;
      overscroll-behavior-x: contain;
    }

    .graph-topbar::-webkit-scrollbar {
      display: none;
    }

    .graph-topbar-track {
      display: inline-flex;
      gap: 8px;
      min-width: max-content;
      white-space: nowrap;
      padding-right: 20px;
    }

    .graph-switch {
      min-height: 36px;
      padding: 0 14px;
      background: var(--soft);
      color: var(--muted);
      font-size: 14px;
      flex-shrink: 0;
    }

    .graph-switch.active {
      background: var(--brand);
      color: #fff;
    }

    .graph-scroll,
    .profile-scroll {
      padding: 12px;
    }

    .person-grid,
    .event-grid,
    .photo-grid {
      display: grid;
      gap: 10px;
    }

    .person-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .person-card,
    .event-card {
      padding: 12px;
      text-align: left;
    }

    .person-card strong,
    .timeline-item strong,
    .event-card strong,
    .settings-item strong {
      display: block;
      font-size: var(--app-font-size);
      line-height: 1.5;
    }

    .person-card span,
    .timeline-item span,
    .event-card span,
    .settings-item span {
      display: block;
      margin-top: 6px;
      font-size: 15px;
      line-height: 1.5;
      color: var(--muted);
    }

    .person-memory-list {
      display: none;
      margin-top: 12px;
      gap: 10px;
      flex-direction: column;
    }

    .person-memory-list.open {
      display: flex;
    }

    .timeline-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .timeline-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .timeline-chip {
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      font-size: 13px;
    }

    .timeline-chip.active {
      background: var(--brand);
      color: #fff;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 10px;
      align-items: start;
    }

    .timeline-track {
      position: relative;
      padding-top: 2px;
    }

    .timeline-track::after {
      content: "";
      position: absolute;
      left: 32px;
      top: 20px;
      bottom: -14px;
      width: 1px;
      background: var(--line);
    }

    .timeline-row:last-child .timeline-track::after {
      display: none;
    }

    .timeline-year {
      width: 100%;
      display: flex;
      justify-content: center;
      font-size: 13px;
      color: var(--muted);
    }

    .timeline-item {
      padding: 12px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .event-grid {
      grid-template-columns: 1fr;
    }

    .photo-entry {
      margin-top: 12px;
    }

    .photo-entry.hidden,
    .graph-panel.hidden {
      display: none;
    }

    .photo-library-btn {
      width: 100%;
      min-height: 42px;
      border-radius: 24px;
      background: var(--brand);
      color: #fff;
      font-size: 15px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .photo-item {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .photo-thumb {
      height: 110px;
      background: linear-gradient(135deg, #d7cab9, #f0e6da);
      position: relative;
    }

    .photo-thumb::after {
      content: "照片";
      position: absolute;
      left: 10px;
      bottom: 10px;
      font-size: 13px;
      color: var(--brand);
    }

    .photo-meta {
      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .profile-hero {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 0 12px;
    }

    .profile-avatar {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: var(--soft);
      color: var(--brand);
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 600;
      flex-shrink: 0;
      border: 1px solid var(--line);
    }

    .profile-section {
      margin-top: 12px;
    }

    .profile-section .stack-card {
      margin-bottom: 10px;
    }

    .fact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .fact-item {
      padding: 12px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .fact-meta {
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .fact-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

      margin: 0;
      font-size: 18px;
      line-height: 1.4;
    }

      padding: 14px;

      display: none;

      align-items: flex-end;
      padding: 12px;
      color: var(--brand);
      font-size: 15px;
      line-height: 1.5;

    .sheet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;

    .sheet-secondary {
      min-height: 46px;
      border-radius: 24px;
      font-size: 15px;

    .sheet-secondary {
      background: var(--soft);
      color: var(--brand);
    }

      align-items: center;
      gap: 8px;
      color: var(--muted);

      flex-shrink: 0;

      right: 3px;

      height: 22px;
      border-radius: 50%;

    .drawer-overlay {
      position: absolute;
      inset: 0;

      z-index: 20;

    .drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {

      top: 0;
      left: 0;
      bottom: 0;

      flex-direction: column;
      overflow: hidden;

      font-size: 18px;
      line-height: 1.4;

      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;

    function normalizeBaseUrl(value = "") {

    function getApiBaseUrl() {
      const configured = normalizeBaseUrl(APP_CONFIG.apiBaseUrl || "");
      if (configured) {
        try {

        } catch (error) {
          console.error(error);
        }
        return configured;
      }

      const stored = normalizeBaseUrl(localStorage.getItem(API_BASE_STORAGE_KEY) || "");
      if (stored) return stored;

      if (window.location?.protocol?.startsWith("http") && window.location?.origin) {
        return normalizeBaseUrl(window.location.origin);
      }

      return "";

    function setApiBaseUrl(value = "") {

    async function probeApiBaseUrl(baseUrl = "", timeoutMs = 3000) {
      const normalized = normalizeBaseUrl(baseUrl);
      if (!normalized) {
        throw new Error("missing api base");
      }
      const controller = new AbortController();
      const timer = window.setTimeout(() => controller.abort(), timeoutMs);
      try {
        const response = await fetch(`${normalized}/api/health`, { signal: controller.signal });
        if (!response.ok) {
          throw new Error(`health ${response.status}`);
        }
        return true;
      } finally {
        window.clearTimeout(timer);
      }
    }

    function api(path, options = {}) {
      const apiBaseUrl = getApiBaseUrl();
      const url = /^https?:\/\//.test(path) ? path : `${apiBaseUrl}${path}`;
      const headers = { ...(options.headers || {}) };
      const body = options.body;
      const hasJsonBody = body !== undefined && !(body instanceof FormData) && !headers["Content-Type"];
      const timeoutMs = Number(options.timeoutMs || 4500);
      const controller = new AbortController();
      const timer = window.setTimeout(() => controller.abort(), timeoutMs);
      if (hasJsonBody) {
        headers["Content-Type"] = "application/json";
      }
      return fetch(url, {
        ...options,
        headers
        ,
        signal: options.signal || controller.signal
      }).finally(() => {
        window.clearTimeout(timer);
      });
    }

    function escapeHtml(value = "") {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatAbsoluteTimestamp(value = "") {
      const date = new Date(value || Date.now());
      if (Number.isNaN(date.getTime())) return "时间待补";
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mi = String(date.getMinutes()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
    }

    function classifyMood(text = "") {
      const normalized = String(text || "").trim();
      if (!normalized) return "";
      if (/(开心|高兴|快乐|兴奋|好玩)/.test(normalized)) return "开心";
      if (/(想念|怀念|感慨)/.test(normalized)) return "怀念";
      if (/(温暖|团圆|安心)/.test(normalized)) return "温暖";
      if (/(难过|伤心|委屈)/.test(normalized)) return "难过";
      return "";
    }

    function buildMemoryTagSet({ text = "", date = "", structuredTags = [], people = [], locations = [], mood = "" } = {}) {
      const inferredPeople = inferPeopleFromTags([...structuredTags, ...people], text);
      const inferredPlaces = inferPlacesFromTags([...structuredTags, ...locations], `${date} ${text}`);
      const inferredTimes = inferTimeFromTags(structuredTags, `${date} ${text}`);
      const moodTag = String(mood || classifyMood(text)).trim();
      return uniqueStrings([
        ...inferredPeople.slice(0, 2),
        ...inferredPlaces.slice(0, 1),
        ...inferredTimes.slice(0, 1),
        ...(moodTag ? [moodTag] : [])
      ], 5);
    }

    function normalizeConversation(item = {}, fallbackIndex = 0) {
      const messages = Array.isArray(item.messages)

        messages,
        updatedAt
      };

    function sortConversationsByUpdatedAt(list = []) {
      return list.slice().sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));
    }

    function getConversationGroupTitle(updatedAt = "") {
      const date = new Date(updatedAt || "");
      if (Number.isNaN(date.getTime())) return "更早";
      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const startOfTarget = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const diffDays = Math.round((startOfToday - startOfTarget) / 86400000);
      if (diffDays <= 0) return "今天";
      if (diffDays === 1) return "昨天";
      return "更早";
    }

    function syncLegacyChatStateFromConversations() {
      const conversations = sortConversationsByUpdatedAt(Array.isArray(state.conversations) ? state.conversations : []);
      state.conversations = conversations;
      state.chatThreads = conversations.map((item) => ({
        key: item.id,
        groupTitle: getConversationGroupTitle(item.updatedAt),
        title: item.title,
        subtitle: item.subtitle
      }));
      state.chatSets = conversations.reduce((acc, item) => {
        acc[item.id] = item.messages.map((entry) => ({ ...entry }));
        return acc;
      }, {});
      if (!state.activeConversationId && conversations[0]?.id) {
        state.activeConversationId = conversations[0].id;
      }
      state.activeChatKey = state.activeConversationId || conversations[0]?.id || state.activeChatKey;
    }

    function getConversationLastMessage(conversation = null, options = {}) {
      const includeCue = Boolean(options.includeCue);
      const messages = Array.isArray(conversation?.messages) ? conversation.messages : [];
      return messages.slice().reverse().find((item) => {
        if (!item?.text) return false;
        if (!includeCue && item.type === "cue") return false;
        return true;

    function migrateLegacyConversations() {
      const fromThreads = Array.isArray(state.chatThreads) && state.chatThreads.length
        ? state.chatThreads.map((thread, index) => normalizeConversation({
            id: thread.key,
            title: thread.title,
            subtitle: thread.subtitle,
            updatedAt: thread.updatedAt || toIsoNow(),
            messages: cloneMessages(thread.key)
          }, index))
        : [];

      if (fromThreads.length) {
        return sortConversationsByUpdatedAt(fromThreads);
      }

      if (Array.isArray(state.messages) && state.messages.length) {
        return [normalizeConversation({
          id: state.activeConversationId || state.activeChatKey || "conversation_latest",
          title: summarizeThreadMessages(state.messages).title,
          subtitle: summarizeThreadMessages(state.messages).subtitle,
          messages: state.messages,
          updatedAt: state.messages[state.messages.length - 1]?.createdAt || toIsoNow()

      return drawerData.flatMap((group, groupIndex) =>

          title: item.title,
          subtitle: item.subtitle,
          messages: cloneMessages(item.key),
          updatedAt: new Date(Date.now() - ((groupIndex * 4) + itemIndex) * 86400000).toISOString()

    function ensureConversationState() {
      if (!Array.isArray(state.conversations) || !state.conversations.length) {
        state.conversations = migrateLegacyConversations();
      } else {
        state.conversations = sortConversationsByUpdatedAt(state.conversations.map((item, index) => normalizeConversation(item, index)));
      }
      const hasActiveConversation = state.conversations.some((item) => item.id === state.activeConversationId);
      if (!state.activeConversationId || !hasActiveConversation) {
        state.activeConversationId = state.conversations[0]?.id || "";
      }
      syncLegacyChatStateFromConversations();
      const active = state.conversations.find((item) => item.id === state.activeConversationId) || state.conversations[0];
      if (active) {
        state.activeConversationId = active.id;
        state.activeChatKey = active.id;
        if (!state.messages.length) {
          state.messages = active.messages.map((item) => normalizeChatMessage(item));
        }
      }
    }

    function isTimeLikeTag(value = "") {
      return /(今天|昨天|最近|往年|更早|春节|中秋|端午|冬天|夏天|春天|秋天|19\d{2}|20\d{2}|年)/.test(String(value || ""));
    }

    function isPlaceLikeTag(value = "") {
      return /(公园|桥|桥边|路|楼|厂|站|学校|医院|家里|厨房|客厅|楼下|外白渡桥|上海|苏州)/.test(String(value || ""));
    }

    function isMetaTag(value = "") {
      return /^(待整理|新书页|刚保存|忆光|照片|照片线索|新线索|怀念|温暖|平静|家人)$/.test(String(value || "").trim());
    }

    function isLikelyPersonLabel(value = "") {
      const normalized = String(value || "").trim();
      if (!normalized) return false;
      if (isMetaTag(normalized) || isTimeLikeTag(normalized) || isPlaceLikeTag(normalized)) return false;
      if (/^(老[\u4e00-\u9fa5]|小[\u4e00-\u9fa5]|阿[\u4e00-\u9fa5]|外孙女|外孙|女儿|儿子|妈妈|爸爸|奶奶|爷爷|老伴|朋友|同学|老师)$/.test(normalized)) return true;
      return normalized.length >= 2 && normalized.length <= 4 && /^[\u4e00-\u9fa5]+$/.test(normalized);
    }

    function summarizeConversationKeywords(messages = []) {
      const userTexts = messages.filter((item) => item.type === "user").map((item) => item.text).filter(Boolean);
      const combined = userTexts.slice(-4).join(" ");
      const people = inferPeopleFromTags([], combined);
      const places = inferPlacesFromTags([], combined);
      const times = inferTimeFromTags([], combined);
      const events = inferEventsFromTags([], combined);
      return {
        people,
        places,
        times,
        events,
        turns: userTexts.length
      };
    }

    function generateConversationTitle(messages = []) {
      const userTexts = messages.filter((item) => item.type === "user").map((item) => String(item.text || "").trim()).filter(Boolean);
      const firstUserText = userTexts[0] || "";
      if (!firstUserText) return "新的聊天";
      const people = inferPeopleFromTags([], userTexts.slice(0, 3).join(" "));
      if (people.length) {
        return `关于${people[0]}的聊天`;
      }
      return compactText(firstUserText, 12) || "新的聊天";
    }

    function summarizeThreadMessages(messages = []) {
      const userTexts = messages.filter((item) => item.type === "user").map((item) => item.text).filter(Boolean);
      const latest = messages.slice().reverse().find((item) => item.text && item.type !== "cue")?.text || "";
      if (!latest) {
        return {
          title: "新的聊天",
          subtitle: "这段对话还没有留下明确主题"
        };
      }
      const title = generateConversationTitle(messages);
      const subtitle = compactText(latest, 30) || "这段对话还没有留下明确主题";
      return { title, subtitle };
    }

    function persistCurrentThreadSnapshot() {
      ensureConversationState();
      const active = getActiveConversation();
      if (!active) return;
      active.messages = state.messages.map((item) => normalizeChatMessage(item));
      active.updatedAt = active.messages[active.messages.length - 1]?.createdAt || toIsoNow();
      const summary = summarizeThreadMessages(active.messages);
      active.title = summary.title;
      active.subtitle = summary.subtitle;
      syncLegacyChatStateFromConversations();
    }

    function startNewChat() {
      persistCurrentThreadSnapshot();
      const id = `chat_${Date.now()}`;
      const conversation = normalizeConversation({
        id,
        title: "新的聊天",
        subtitle: "刚刚开始的一段新对话",
        updatedAt: toIsoNow(),
        messages: [{
          type: "ai",
          text: "新的聊天已经开始了。你想先从今天、照片，还是某段旧事说起？",
          status: "她正在听",
          createdAt: toIsoNow()
        }]
      });
      state.conversations = sortConversationsByUpdatedAt([conversation, ...(state.conversations || [])]);
      state.activeConversationId = id;
      syncLegacyChatStateFromConversations();
      state.messages = conversation.messages.map((item) => normalizeChatMessage(item));
      renderChat();
      renderDrawer();
      persistChatState();
      closeDrawer();
    }

    function getCompanionName() {
      return serverState.state?.settings?.companionName || "温伴";
    }

    function getCompanionShortName() {
      return getCompanionName().slice(-1) || "伴";
    }

    function getProfileName() {
      return serverState.state?.profile?.name || serverState.userCard?.name || "李阿姨";
    }

    function getProfilePageCount() {
      return state.memoryCards.length || 0;
    }

    function getAvatarLabel() {
      return getProfileName().slice(0, 1) || "我";
    }

    function getCompanionStatusLabel() {
      return document.getElementById("companionStatus").textContent || "她正在听";
    }

    function escapeAttribute(value = "") {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function formatMessageTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleTimeString("zh-CN", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }

    function formatRelativeUpdateTime(value = "") {
      const date = new Date(value || "");
      if (Number.isNaN(date.getTime())) return "刚刚更新";
      const now = new Date();
      const diffMs = now - date;
      const diffMin = Math.max(0, Math.round(diffMs / 60000));
      if (diffMin < 1) return "刚刚更新";
      if (diffMin < 60) return `${diffMin} 分钟前`;
      const diffHour = Math.round(diffMin / 60);
      if (diffHour < 24) return `${diffHour} 小时前`;
      return formatAbsoluteTimestamp(value).slice(0, 10);
    }

    function toIsoNow() {
      return new Date().toISOString();
    }

    function normalizeChatMessage(item = {}) {
      return {
        type: item.type || item.role || "ai",
        text: String(item.text || item.content || "").trim(),
        cue: String(item.cue || "").trim(),
        image: Boolean(item.image),
        imageUrl: String(item.imageUrl || "").trim(),
        status: String(item.status || "").trim(),
        createdAt: String(item.createdAt || "").trim() || toIsoNow()
      };
    }

    function compactText(text = "", limit = 32) {
      const normalized = String(text || "").trim().replace(/\s+/g, " ");
      if (normalized.length <= limit) return normalized;
      return `${normalized.slice(0, Math.max(0, limit - 1))}…`;
    }

    function sanitizeStringArray(value = [], limit = 8) {
      return uniqueStrings(Array.isArray(value) ? value : [], limit);
    }

    function normalizeProfileInsights(input = null) {
      const source = input && typeof input === "object" ? input : {};
      return {
        speakingStyle: String(source.speakingStyle || "").trim(),
        worldview: String(source.worldview || "").trim(),
        likes: sanitizeStringArray(source.likes, 8),
        dislikes: sanitizeStringArray(source.dislikes, 8),
        habits: sanitizeStringArray(source.habits, 8),
        goals: sanitizeStringArray(source.goals, 8),
        importantPeople: sanitizeStringArray(source.importantPeople, 8),
        keyMemories: sanitizeStringArray(source.keyMemories, 8),
        userStyle: {
          talkingPace: String(source.userStyle?.talkingPace || "").trim(),
          reactsWellTo: sanitizeStringArray(source.userStyle?.reactsWellTo, 6),
          reactsPoorlyTo: sanitizeStringArray(source.userStyle?.reactsPoorlyTo, 6),
          anchorTopics: sanitizeStringArray(source.userStyle?.anchorTopics, 6),
          humorStyle: String(source.userStyle?.humorStyle || "").trim()
        }
      };
    }

    function normalizeHealthProfile(input = null) {
      const source = input && typeof input === "object" ? input : {};
      const medications = Array.isArray(source.medications) ? source.medications : [];
      const reminderPreferences = source.reminderPreferences && typeof source.reminderPreferences === "object"
        ? source.reminderPreferences
        : {};
      return {
        chronicConditions: sanitizeStringArray(source.chronicConditions, 8),
        medications: medications.map((item, index) => ({
          id: String(item.id || `med_${index}`).trim() || `med_${index}`,
          name: String(item.name || "").trim(),
          schedule: String(item.schedule || "").trim(),
          time: sanitizeStringArray(item.time, 4)
        })).filter((item) => item.name),
        allergies: sanitizeStringArray(source.allergies, 8),
        reminderPreferences: {
          medication: reminderPreferences.medication !== false,
          sleep: reminderPreferences.sleep !== false,
          appointment: reminderPreferences.appointment === true
        }
      };
    }

    function buildHealthProfileSummary(profile = state.healthProfile) {
      const health = normalizeHealthProfile(profile);
      const parts = [];
      if (health.chronicConditions.length) parts.push(`慢病：${health.chronicConditions.join("、")}`);
      if (health.medications.length) {
        parts.push(`用药：${health.medications.map((item) => `${item.name}${item.schedule ? `（${item.schedule}）` : ""}`).join("；")}`);
      }
      if (health.allergies.length) parts.push(`过敏：${health.allergies.join("、")}`);
      return parts.join("｜") || "还没记录健康画像";
    }

    function buildMedicationReminderList(profile = state.healthProfile, now = new Date()) {
      const health = normalizeHealthProfile(profile);
      if (!health.reminderPreferences.medication) return [];
      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      return health.medications.flatMap((item) => {
        const times = Array.isArray(item.time) ? item.time : [];
        return times.map((slot) => {
          const match = String(slot || "").match(/^(\d{1,2}):(\d{2})$/);
          if (!match) return null;
          const targetMinutes = Number(match[1]) * 60 + Number(match[2]);
          const diff = Math.abs(currentMinutes - targetMinutes);
          if (diff > 45) return null;
          return {
            name: item.name,
            time: slot,
            schedule: item.schedule || "",
            diff
          };
        }).filter(Boolean);
      }).sort((a, b) => a.diff - b.diff);
    }

    function extractHealthProfilePatch(text = "", currentProfile = state.healthProfile) {
      const value = String(text || "").trim();
      if (!value) return null;
      const next = normalizeHealthProfile(currentProfile);
      let changed = false;

      const conditionPatterns = [
        "糖尿病", "阿兹海默", "阿尔茨海默", "高血压", "高血糖", "哮喘", "心脏病", "胃病", "过敏"
      ];
      conditionPatterns.forEach((label) => {
        if (value.includes(label) && !next.chronicConditions.includes(label)) {
          next.chronicConditions.push(label);
          changed = true;
        }
      });

      const allergyMatch = value.match(/对(.{1,8})(过敏)/);
      if (allergyMatch?.[1]) {
        const allergy = String(allergyMatch[1]).trim();
        if (allergy && !next.allergies.includes(allergy)) {
          next.allergies.push(allergy);
          changed = true;
        }
      }

      const medicationPatterns = ["二甲双胍", "胰岛素", "降压药", "阿司匹林", "感冒药", "止痛药"];
      medicationPatterns.forEach((medName) => {
        if (!value.includes(medName)) return;
        const existing = next.medications.find((item) => item.name === medName);
        const times = [];
        if (/(早晚各一次|一天两次|早晚两次)/.test(value)) times.push("08:00", "20:00");
        if (/(早上|早餐后)/.test(value)) times.push("08:00");
        if (/(中午|午饭后)/.test(value)) times.push("12:30");
        if (/(晚上|晚饭后|睡前)/.test(value)) times.push("20:00");
        const schedule = /早晚各一次/.test(value)
          ? "早晚各一次"
          : /一天两次/.test(value)
            ? "一天两次"
            : /一天一次/.test(value)
              ? "一天一次"
              : "";
        if (existing) {
          const nextTimes = sanitizeStringArray([...(existing.time || []), ...times], 4);
          if (nextTimes.join("|") !== (existing.time || []).join("|") || (schedule && schedule !== existing.schedule)) {
            existing.time = nextTimes;
            existing.schedule = schedule || existing.schedule;
            changed = true;
          }
        } else {
          next.medications.push({
            id: `med_${Date.now()}_${Math.random().toString(16).slice(2, 6)}`,
            name: medName,
            schedule,
            time: sanitizeStringArray(times, 4)
          });
          changed = true;
        }
      });

      if (/别提醒我吃药|不用提醒我吃药/.test(value)) {
        next.reminderPreferences.medication = false;
        changed = true;
      }
      if (/可以提醒我吃药|记得提醒我吃药/.test(value)) {
        next.reminderPreferences.medication = true;
        changed = true;
      }

      return changed ? normalizeHealthProfile(next) : null;
    }

    async function persistHealthProfile(profile = state.healthProfile) {
      state.healthProfile = normalizeHealthProfile(profile);
      await persistStateKey("healthProfile", state.healthProfile).catch((error) => console.error(error));
      if (serverState.state) {
        serverState.state.healthProfile = state.healthProfile;
      }
    }

    async function maybeCaptureHealthProfile(text = "") {
      const patch = extractHealthProfilePatch(text, state.healthProfile);
      if (!patch) return false;
      await persistHealthProfile(patch);
      renderProfileSections();
      return true;
    }

    function buildHealthSupportCue(text = "", profile = state.healthProfile) {
      const value = String(text || "").trim();
      const health = normalizeHealthProfile(profile);
      const dueMedication = buildMedicationReminderList(health)[0] || null;

      if (dueMedication) {
        return `到点了，${dueMedication.name}别又忘了，按你平时的节奏吃就行。`;
      }
      if (/(不舒服|难受|头疼|胃疼|头晕|病了|感冒了|咳嗽|发烧)/.test(value)) {
        if (health.chronicConditions.includes("糖尿病") && /(头晕|难受|发虚)/.test(value)) {
          return "你先留意一下血糖，方便的话测一测，别硬扛。";
        }
        return "先歇一歇，喝点水缓一缓；要是一直难受，就别硬撑，早点去看医生。";
      }
      if (/(忘了|记性不好|又忘了|总忘)/.test(value)) {
        return "要不要我顺手帮你记一下，不然你一会儿八成又要回来翻。";
      }
      return "";
    }

    function normalizeFactText(value = "") {
      return String(value || "")
        .trim()
        .replace(/[，。！!？?、,.]/g, " ")
        .replace(/\s+/g, " ")
        .replace(/一起/g, "")
        .replace(/正在|有点|总是|经常|常常|特别|真的/g, "")
        .replace(/时候|那天/g, "")
        .trim();
    }

    function canonicalizeFactText(value = "") {
      return normalizeFactText(value)
        .replace(/洛克王国(游戏)?/g, "洛克王国")
        .replace(/玩(洛克王国|游戏)/g, "玩$1")
        .replace(/跑图打怪/g, "一起玩洛克王国")
        .replace(/与朋友一起玩游戏|和朋友一起玩游戏/g, "和朋友一起玩游戏")
        .replace(/与(.+?)一起玩洛克王国/g, "和$1一起玩洛克王国")
        .replace(/一起玩游戏/g, "玩游戏")
        .trim();
    }

    function normalizeFactPredicate(value = "") {
      const normalized = String(value || "").trim();
      if (!normalized) return "提到";
      if (/(玩|组队玩|一起玩|带.*玩|打游戏)/.test(normalized)) return "玩";
      if (/(上班|工作|值班)/.test(normalized)) return "工作";
      if (/(照顾|陪|带|帮)/.test(normalized)) return "陪伴";
      if (/(认识|熟识|结识)/.test(normalized)) return "认识";
      if (/(吃|做饭|聚餐|包饺子)/.test(normalized)) return "吃饭";
      if (/(散步|逛|碰到|重逢|去)/.test(normalized)) return "相处";
      return normalized;
    }

    function extractPeopleFromFactText(text = "") {
      const knownPeople = uniqueStrings([
        ...(state.profileInsights?.importantPeople || []),
        ...(state.personAliases || []).flatMap((item) => [item.canonical, ...(item.aliases || [])]),
        ...state.people.map((item) => item.name)
      ], 32);
      return knownPeople.filter((name) => name && String(text).includes(name)).slice(0, 4);
    }

    function buildFactDatabaseFromConfirmedFacts() {
      return (Array.isArray(state.confirmedFacts) ? state.confirmedFacts : [])
        .map((item, index) => ({
          id: String(item.id || `fact_${index}`).trim(),
          subject: String(item.subject || "用户").trim() || "用户",
          predicate: normalizeFactPredicate(item.predicate || "提到"),
          object: canonicalizeFactText(item.object || item.canonicalLabel || item.label || ""),
          canonicalLabel: String(item.canonicalLabel || item.label || item.object || "").trim(),
          aliases: uniqueStrings(item.aliases || [], 8),
          relatedPeople: uniqueStrings(item.relatedPeople || [], 6),
          timeLabels: uniqueStrings(item.timeLabels || [], 4),
          locations: uniqueStrings(item.locations || [], 4),
          sourceText: String(item.sourceText || "").trim(),
          evidence: Array.isArray(item.evidence) ? item.evidence : [],
          updatedAt: String(item.updatedAt || "").trim() || toIsoNow()
        }))
        .filter((item) => item.canonicalLabel);
    }

    function buildPersonAliasesFromState() {
      const people = uniqueStrings([
        ...((state.profileInsights?.importantPeople || [])),
        ...state.people.map((item) => item.name),
        ...state.memoryCards.flatMap((item) => Array.isArray(item.tags) ? item.tags : [])
      ].filter((item) => isLikelyPersonLabel(item)), 16);

      return people.map((name) => {
        const aliases = uniqueStrings(
          state.memoryCards
            .flatMap((item) => Array.isArray(item.tags) ? item.tags : [])
            .filter((tag) => tag && tag !== name && isLikelyPersonLabel(tag) && (tag.includes(name) || name.includes(tag))),
          4
        );
        return {
          canonical: name,
          aliases,
          evidenceCount: state.memoryCards.filter((item) => String(item.text || "").includes(name) || (item.tags || []).includes(name)).length
        };
      }).filter((item) => item.canonical);
    }

    function uniqueStrings(items = [], limit = 8) {
      const result = [];
      items.forEach((item) => {
        const value = String(item || "").trim();
        if (!value || result.includes(value)) return;
        result.push(value);
      });
      return result.slice(0, limit);
    }

    function withTimeout(promise, ms = 6000, fallbackError = "request timeout") {
      return Promise.race([
        promise,
        new Promise((_, reject) => window.setTimeout(() => reject(new Error(fallbackError)), ms))
      ]);
    }

    function normalizePendingCueItem(item = {}) {
      if (typeof item === "string") {
        return {
          id: `cue_${Date.now()}_${Math.random().toString(16).slice(2, 6)}`,
          label: item,
          sourceText: item,
          type: "pending",
          status: "pending"
        };
      }

      return {
        id: String(item.id || `cue_${Date.now()}_${Math.random().toString(16).slice(2, 6)}`).trim(),
        label: String(item.label || item.summary || item.sourceText || "").trim() || "待整理线索",
        summary: String(item.summary || "").trim(),
        sourceText: String(item.sourceText || item.filteredText || item.label || item.summary || "").trim(),
        type: String(item.type || item.candidateType || "pending").trim(),
        status: String(item.status || "pending").trim(),
        candidate: item.candidate && typeof item.candidate === "object" ? item.candidate : null,
        createdAt: String(item.createdAt || "").trim() || toIsoNow()
      };
    }

    function buildCandidateSummary(candidate = {}, fallbackText = "") {
      const text = String(candidate.filteredText || fallbackText || "").trim();
      const people = Array.isArray(candidate.people) && candidate.people.length ? candidate.people : inferPeopleFromTags([], text);
      const places = inferPlacesFromTags([], text);
      const times = candidate.timeRef ? [candidate.timeRef] : inferTimeFromTags([], text);
      const events = inferEventsFromTags([], text);
      const stamp = formatAbsoluteTimestamp(candidate.createdAt || toIsoNow());
      const relatedHistory = state.messages
        .filter((item) => item.type === "user" && item.text && item.text !== text)
        .slice(-6)
        .map((item) => String(item.text || "").trim())
        .filter((line) => !people.length || people.some((person) => line.includes(person)));
      const historyHint = relatedHistory[relatedHistory.length - 1] || "";
      const core = events[0]
        || (people.length && places.length ? `${people[0]}在${places[0]}的片段` : "")
        || (people.length ? `${people.join("、")}相关线索` : "")
        || compactText(text, 16)
        || "待整理线索";
      const subtitle = [
        times[0] || stamp,
        people.length ? `人物：${people.join("、")}` : "",
        places[0] ? `地点：${places[0]}` : "",
        historyHint ? `前文：${compactText(historyHint, 14)}` : ""
      ].filter(Boolean).join("｜");
      return {
        label: core,
        summary: subtitle || stamp
      };
    }

    function detectExplicitMemorySaveIntent(text = "") {
      const value = String(text || "").trim();
      if (!value) return false;
      return /(记一下|记录一下|帮我记下|帮我记录|存一下|存到忆光|收进忆光|写进忆光|记到忆光)/.test(value);
    }

    function buildExplicitMemoryDraftText(text = "") {
      const value = String(text || "").trim();
      const stripped = value
        .replace(/^(那你|你|帮我|给我)?(就)?(把)?/g, "")
        .replace(/(记一下|记录一下|帮我记下|帮我记录|存一下|存到忆光|收进忆光|写进忆光|记到忆光)(吧|一下)?/g, "")
        .replace(/[，。！!？?]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      if (stripped && stripped.length >= 6) return stripped;
      const fallback = [...state.messages]
        .reverse()
        .find((item) => item.type === "user" && String(item.text || "").trim() && String(item.text || "").trim() !== value);
      return String(fallback?.text || "").trim() || "";
    }

    function mergeReviewedCandidate(rawItem = {}) {
      const safeSummary = String(rawItem.summary || "").trim();
      const safeSourceText = String(rawItem.sourceText || "").trim();
      if (!safeSummary || !safeSourceText) return null;
      const label = safeSummary;
      const normalized = normalizePendingCueItem({
        ...rawItem,
        label,
        summary: safeSummary,
        sourceText: safeSourceText,
        candidateType: "reviewed",
        status: "pending",
        createdAt: rawItem.createdAt || toIsoNow(),
        candidate: rawItem
      });
      const existingIndex = state.memoryCandidates.findIndex((item) =>
        String(item.label || "").trim() === label
        || String(item.sourceText || "").trim() === safeSourceText
      );
      if (existingIndex >= 0) {
        state.memoryCandidates[existingIndex] = {
          ...state.memoryCandidates[existingIndex],
          ...normalized,
          summary: safeSummary,
          candidate: { ...(state.memoryCandidates[existingIndex].candidate || {}), ...(rawItem || {}) }
        };
      } else {
        state.memoryCandidates.unshift({
          ...normalized,
          summary: safeSummary,
          candidate: rawItem
        });
      }
      state.memoryCandidates = state.memoryCandidates.slice(0, 12);
      state.pendingCues = state.memoryCandidates.slice(0, 10).map((item) => normalizePendingCueItem(item));
      return state.memoryCandidates[0];
    }

    function buildMemoryCardFromStructured(structured = {}, fallback = {}) {
      const people = Array.isArray(structured.people) ? structured.people.map((item) => item?.name || item).filter(Boolean) : [];
      const timelineLabel = structured.timelineLabel || fallback.timelineLabel || fallback.date || formatAbsoluteTimestamp(structured.createdAt || fallback.createdAt || toIsoNow());
      const content = structured.content || fallback.content || fallback.text || "";
      const tags = buildMemoryTagSet({
        text: content,
        date: timelineLabel,
        structuredTags: Array.isArray(structured.tags) ? structured.tags : [],
        people,
        locations: Array.isArray(structured.locations) ? structured.locations : [],
        mood: structured.mood || fallback.mood || ""
      });
      const detailParts = [
        structured.summary || fallback.summary || "",
        structured.followUpQuestion || fallback.followUpQuestion || ""
      ].filter(Boolean);
      return normalizeMemoryCard({
        id: structured.id || fallback.id || `memory_${Date.now()}`,
        title: structured.title || fallback.title || "",
        summary: structured.summary || fallback.summary || "",
        content,
        timelineLabel,
        tags,
        people,
        locations: Array.isArray(structured.locations) ? structured.locations : [],
        emotions: [structured.mood || fallback.mood || ""].filter(Boolean),
        followUpQuestion: detailParts.join(" "),
        createdAt: structured.createdAt || fallback.createdAt || toIsoNow(),
        linkedFactId: structured.linkedFactId || fallback.linkedFactId || ""
      });
    }

    function extractCandidateDraftContext(candidate = {}) {
      const sourceText = String(candidate.sourceText || candidate.filteredText || candidate.label || "").trim();
      const people = Array.isArray(candidate.candidate?.people) ? candidate.candidate.people : (Array.isArray(candidate.people) ? candidate.people : []);
      const relatedTurns = state.messages
        .filter((item) => item.type === "user")
        .map((item) => String(item.text || "").trim())
        .filter(Boolean)
        .filter((line) => line === sourceText || !people.length || people.some((person) => line.includes(person)))
        .slice(-4);
      return {
        candidateId: String(candidate.id || "").trim(),
        label: String(candidate.label || "").trim(),
        summary: String(candidate.summary || "").trim(),
        sourceText,
        people,
        relatedTurns
      };
    }

    function applyConfirmedFactsState(payload = {}) {
      if (Array.isArray(payload.confirmedFacts)) {
        state.confirmedFacts = payload.confirmedFacts;
      }
      if (Array.isArray(payload.memoryCandidates)) {
        state.memoryCandidates = payload.memoryCandidates.map((item) => ({
          ...normalizePendingCueItem(item),
          candidate: item?.candidate || item
        }));
      }
      state.factDatabase = buildFactDatabaseFromConfirmedFacts();
      state.pendingCues = state.memoryCandidates.slice(0, 10).map((item) => normalizePendingCueItem(item));
    }

    function upsertMemoryCard(card = {}, cardId = "") {
      if (cardId) {
        state.memoryCards = state.memoryCards.map((item) => item.id === cardId ? { ...card, id: cardId } : item);
        return;
      }
      state.memoryCards.unshift(card);
    }

    async function syncConfirmedKnowledge() {
      await Promise.all([
        persistStateKey("confirmedFacts", state.confirmedFacts).catch((error) => console.error(error)),
        persistStateKey("factDatabase", state.factDatabase).catch((error) => console.error(error)),
        persistStateKey("memoryCandidates", state.memoryCandidates).catch((error) => console.error(error))
      ]);
    }

    async function confirmCandidateIntoMemory(candidate = {}, preferredText = "") {
      const draftContext = extractCandidateDraftContext(candidate);
      const draftInput = String(preferredText || draftContext.sourceText || candidate.label || "").trim();
      const localDraft = {
        title: compactText(draftInput, 14),
        content: draftInput,
        summary: candidate.summary || compactText(draftInput, 36),
        mood: "平静",
        tags: [],
        people: draftContext.people || [],
        locations: [],
        timelineLabel: formatAbsoluteTimestamp(toIsoNow())
      };
      removePendingCandidate(candidate.id);
      const card = buildMemoryCardFromStructured({
        ...localDraft,
        linkedFactId: ""
      }, {
        content: localDraft.content,
        summary: localDraft.summary,
        mood: localDraft.mood,
        title: localDraft.title,
        linkedFactId: ""
      });
      upsertMemoryCard(card);
      renderBookCards();
      renderPendingCues();
      renderProfileSections();
      await persistMemoriesState();
      await persistDerivedState();

      let finalDraft = localDraft;
      try {
        const draft = await withTimeout(
          requestMemoryDraft(draftInput, "候选线索整理", draftContext),
          2500,
          "memory draft timeout"
        );
        finalDraft = {
          ...localDraft,
          title: draft.title || localDraft.title,
          content: String(draft.content || draftInput).trim() || draftInput,
          summary: draft.summary || localDraft.summary,
          mood: draft.mood || localDraft.mood,
          tags: Array.isArray(draft.tags) ? draft.tags : localDraft.tags
        };
      } catch (error) {
        console.error(error);
      }

      try {
        const confirmPayload = await withTimeout(
          requestConfirmCandidate(candidate.id, finalDraft.content),
          3500,
          "confirm candidate timeout"
        );
        applyConfirmedFactsState(confirmPayload);
        const linkedFactId = String(confirmPayload.resolvedFact?.id || "").trim();
        const upgradedCard = buildMemoryCardFromStructured({
          ...finalDraft,
          linkedFactId
        }, {
          content: finalDraft.content,
          summary: finalDraft.summary,
          mood: finalDraft.mood,
          title: finalDraft.title,
          linkedFactId
        });
        upsertMemoryCard({ ...upgradedCard, id: card.id }, card.id);
        renderBookCards();
        renderPendingCues();
        renderGraph();
        renderProfileSections();
        await persistMemoriesState();
        await syncConfirmedKnowledge();
        await persistDerivedState();
        return { card: upgradedCard, draft: finalDraft, confirmPayload };
      } catch (error) {
        console.error(error);
        appendAiReply("这页我先替你收进忆光了，图谱同步刚才慢了一下，等会儿你再点一次我继续补。");
        return { card, draft: finalDraft, confirmPayload: null };
      }
    }

    function buildRetrievalContext(text = "") {
      const recentMemories = state.memoryCards.slice(0, 8).map((card) => ({
        id: card.id,
        title: compactText(card.text, 18),
        summary: card.text,
        timelineLabel: card.date,
        people: (card.tags || []).slice(0, 2).map((name) => ({ name })),
        actions: [],
        locations: inferPlaceHints(`${card.text} ${card.detail}`),
        tags: Array.isArray(card.tags) ? card.tags : []
      }));
      const verifiedFacts = uniqueStrings([
        ...state.people.slice(0, 6).map((item) => item.name),
        ...state.places.slice(0, 6).map((item) => item.name)
      ], 8);
      return {
        activeEvent: state.activeEventContext,
        verifiedFacts,
        recentStrategyTrail: state.strategyTrail.slice(0, 4),
        lifeSummaries: state.lifeSummaries.slice(0, 6),
        memories: recentMemories,
        photos: state.photos.slice(0, 6),
        localSignals: {
          isMetaConversation: /(闪退|权限|按钮|设置|同步|连不上|没保存|app|版本|页面)/.test(String(text || ""))
        }
      };
    }

    function buildActiveEventFromTurn(text = "", replyPlan = {}, candidate = null) {
      const source = candidate || {};
      const current = state.activeEventContext || {};
      const people = uniqueStrings([
        ...(Array.isArray(source.people) ? source.people : []),
        ...extractMemorySignals(text)
          .filter((signal) => signal.startsWith("整理人物线索："))
          .flatMap((signal) => signal.replace("整理人物线索：", "").split("、"))
      ], 4);
      const timelineLabel = source.timeRef?.normalizedLabel
        || replyPlan.timeRef?.normalizedLabel
        || replyPlan.resolvedRelativeTime
        || inferTimeIntent(text)
        || current.timelineLabel
        || "";

      return {
        id: current.id || `event_${Date.now()}`,
        updatedAt: toIsoNow(),
        sourceText: text,
        summary: source.summary || replyPlan.replyGoal || current.summary || compactText(text, 28),
        people,
        timelineLabel,
        resolvedDate: source.timeRef?.resolvedDate || replyPlan.timeRef?.resolvedDate || replyPlan.resolvedRelativeTime || current.resolvedDate || "",
        correctionType: String(replyPlan.correctionType || "none").trim(),
        replyStrategy: String(replyPlan.replyStrategy || "").trim(),
        confirmationPrompt: String(replyPlan.confirmationPrompt || "").trim()
      };
    }

    function maybeAppendRevisionLog(text = "", replyPlan = {}) {
      const correctionType = String(replyPlan.correctionType || "none").trim();
      const needsRevision = correctionType !== "none" || replyPlan.revisionNeeded || replyPlan.hasEntityConflict || replyPlan.hasTimeConflict;
      if (!needsRevision) return;
      state.revisionLogs.unshift({
        id: `revision_${Date.now()}_${Math.random().toString(16).slice(2, 6)}`,
        createdAt: toIsoNow(),
        text,
        correctionType,
        targetEventId: state.activeEventContext?.id || "",
        confirmationPrompt: String(replyPlan.confirmationPrompt || "").trim(),
        warnings: Array.isArray(replyPlan.consistencyWarnings) ? replyPlan.consistencyWarnings : []
      });
      state.revisionLogs = state.revisionLogs.slice(0, 30);
    }

    async function persistDerivedState() {
      const tasks = [];
      tasks.push(persistStateKey("memoryCandidates", state.memoryCandidates).catch((error) => console.error(error)));
      tasks.push(persistStateKey("revisionLogs", state.revisionLogs).catch((error) => console.error(error)));
      tasks.push(persistStateKey("activeEventContext", state.activeEventContext).catch((error) => console.error(error)));
      tasks.push(persistStateKey("lastChatRecap", state.lastChatRecap).catch((error) => console.error(error)));
      tasks.push(persistStateKey("strategyTrail", state.strategyTrail).catch((error) => console.error(error)));
      await Promise.all(tasks);
    }

    function inferTimeIntent(text = "") {
      const normalized = String(text || "").trim();
      if (!normalized) return "";
      if (/(现在|此刻|刚刚|今天)/.test(normalized)) return "今天";
      if (/昨天/.test(normalized)) return "昨天";
      if (/(前天|前几天)/.test(normalized)) return "最近几天";
      if (/(去年|前年)/.test(normalized)) return "往年";
      if (/(小时候|年轻的时候|以前)/.test(normalized)) return "更早以前";
      if (/春节/.test(normalized)) return "春节";
      return "";
    }

    function extractPhotoKeywords(text = "") {
      const normalized = String(text || "").trim();
      if (!normalized) return [];
      const tokens = normalized
        .split(/[\s，。、“”‘’；：！？,.!?\-_/]+/)
        .map((item) => item.trim())
        .filter(Boolean)
        .filter((item) => item.length >= 2);
      const fixedTerms = [
        "照片",
        "相册",
        "那张",
        "这张",
        "春节",
        "婚纱照",
        "老张",
        "老伴",
        "家人",
        "外孙女",
        "公园",
        "厨房",
        "工厂",
        "桥边"
      ].filter((item) => normalized.includes(item));
      return uniqueStrings([...fixedTerms, ...tokens], 12);
    }

    function scorePhotoMatch(photo = {}, text = "") {
      const haystack = `${photo.tag || ""} ${photo.note || ""} ${photo.caption || ""}`.trim();
      const keywords = extractPhotoKeywords(text);
      let score = 0;

      const intent = inferTimeIntent(text);
      if (intent && matchPhotosByTimeIntent(text).some((item) => item.id === photo.id)) {
        score += 3;
      }

      keywords.forEach((keyword) => {
        if (keyword && haystack.includes(keyword)) {
          score += keyword.length >= 3 ? 2 : 1;
        }
      });

      if (/(照片|相册|那张|这张|翻到)/.test(String(text || ""))) {
        score += 1;
      }

      return score;
    }

    function matchPhotosByTimeIntent(text = "") {
      const intent = inferTimeIntent(text);
      if (!intent) return [];
      return state.photos.filter((photo) => {
        const note = String(photo.note || "");
        const caption = String(photo.caption || "");
        if (intent === "今天") return /今天|刚刚|上午|下午|晚上/.test(note + caption);
        if (intent === "昨天") return /昨天/.test(note + caption);
        if (intent === "最近几天") return /昨天|前天|最近/.test(note + caption);
        if (intent === "往年") return /2024|2023|去年|前年/.test(note + caption);
        if (intent === "更早以前") return /旧照|小时候|年轻/.test(note + caption);
        if (intent === "春节") return /春节/.test(note + caption);
        return false;
      }).slice(0, 2);
    }

    function matchPhotosForRecall(text = "") {
      const normalized = String(text || "").trim();
      if (!normalized || !state.photos.length) return [];
      const scored = state.photos
        .map((photo) => ({
          photo,
          score: scorePhotoMatch(photo, normalized)
        }))
        .filter((item) => item.score > 0)
        .sort((a, b) => b.score - a.score || String(b.photo.note || "").localeCompare(String(a.photo.note || ""), "zh-CN"));
      return scored.slice(0, 3).map((item) => item.photo);
    }

    function buildPhotoRecallQuestion(photo = {}) {
      const note = String(photo.note || "").trim() || "那天";
      const caption = String(photo.caption || "").trim();
      const tag = String(photo.tag || "这张照片").trim();
      if (caption && /谁|一起|家人|老张|老伴|外孙|朋友/.test(caption)) {
        return `我先把 ${note} 这张和${tag}有关的照片翻出来了。你还记得当时旁边都有谁吗？`;
      }
      if (caption && /春节|过年|团圆/.test(caption + note)) {
        return `我翻到 ${note} 这张照片了。那次过年最让你记住的是哪一幕？`;
      }
      if (caption && /婚纱照|旧照|年轻/.test(caption + note)) {
        return `我把 ${note} 这张旧照片先挂出来了。你想先讲当时的人，还是那天发生的事？`;
      }
      return `我先把 ${note} 这张和${tag}有关的照片翻出来了。你愿意先讲讲这张照片背后的那件事吗？`;
    }

    function buildPhotoRecallPackage(text = "") {
      const normalized = String(text || "").trim();
      if (!normalized || !state.photos.length) return null;
      const explicitPhotoIntent = /(照片|相册|那张|这张|翻到|找出|找找|调出来|发出来)/.test(normalized);
      const matched = explicitPhotoIntent ? matchPhotosForRecall(normalized) : matchPhotosByTimeIntent(normalized);
      const target = matched[0];
      if (!target) return null;
      return {
        target,
        cue: `她翻到了一张照片：${target.tag}，时间是 ${target.note}。`,
        question: buildPhotoRecallQuestion(target),
        related: matched
      };
    }

    function buildPhotoMemoryCard({ tag = "照片线索", note = "待补时间", caption = "", createdAt = "", imageUrl = "" } = {}) {
      const yearLabel = String(note || "").match(/(19|20)\d{2}/)?.[0] || new Date(createdAt || Date.now()).getFullYear();
      const titleText = caption || `收进了一张和${tag}有关的照片`;
      return {
        id: `memory_photo_${Date.now()}_${Math.random().toString(16).slice(2, 6)}`,
        date: `${yearLabel}年`,
        text: titleText,
        tags: ["照片线索", tag].filter(Boolean),
        detail: `${note}${imageUrl ? "，已进入照片线索与时间整理。" : "，等待继续补人物和事件。"}`,
        imageUrl
      };
    }

    function inferPlaceHints(text = "") {
      const normalized = String(text || "").trim();
      const knownPlaces = ["公园", "桥边", "家里", "厨房", "客厅", "纺织厂", "学校", "医院", "楼下", "车站", "上海", "苏州", "外白渡桥"];
      return knownPlaces.filter((place) => normalized.includes(place));
    }

    function inferPeopleFromTags(tags = [], text = "") {
      const knownPeople = uniqueStrings([
        ...(state.profileInsights?.importantPeople || []),
        ...(state.personAliases || []).flatMap((item) => [item.canonical, ...(item.aliases || [])]),
        ...state.people.map((item) => item.name)
      ].filter((item) => isLikelyPersonLabel(item)), 24);
      const normalizedText = String(text || "");
      return uniqueStrings(
        (Array.isArray(tags) ? tags : []).filter((tag) => knownPeople.includes(tag) || isLikelyPersonLabel(tag))
          .concat(knownPeople.filter((name) => normalizedText.includes(name))),
        4
      );
    }

    function inferTimeFromTags(tags = [], text = "") {
      const normalized = `${Array.isArray(tags) ? tags.join(" ") : ""} ${text || ""}`.trim();
      const matches = [];
      const year = normalized.match(/(19|20)\d{2}年?/g) || [];
      matches.push(...year.map((item) => item.replace(/年$/, "") + "年"));
      ["春节", "中秋", "端午", "冬天", "夏天", "春天", "秋天", "今天", "昨天", "最近"].forEach((label) => {
        if (normalized.includes(label)) matches.push(label);
      });
      const inferred = inferTimeIntent(normalized);
      if (inferred) matches.push(inferred);
      return uniqueStrings(matches, 3);
    }

    function inferPlacesFromTags(tags = [], text = "") {
      const normalizedTags = Array.isArray(tags) ? tags : [];
      const regexMatches = String(text || "").match(/[\u4e00-\u9fa5]{1,8}(公园|路|桥|楼|厂|站|学校|医院|家里|厨房|客厅)/g) || [];
      return uniqueStrings([...inferPlaceHints(`${normalizedTags.join(" ")} ${text || ""}`), ...regexMatches, ...normalizedTags.filter((tag) => /(公园|路|桥|楼|厂|站|学校|医院|家里|厨房|客厅)/.test(tag))], 4);
    }

    function inferEventsFromTags(tags = [], text = "") {
      const normalizedTags = Array.isArray(tags) ? tags : [];
      const excluded = new Set([
        ...inferPeopleFromTags(tags, text),
        ...inferTimeFromTags(tags, text),
        ...inferPlacesFromTags(tags, text),
        "待整理", "新书页", "刚保存", "忆光", "照片", "照片线索", "新线索", "怀念", "温暖", "平静"
      ]);
      const fromTags = normalizedTags.filter((tag) => tag && !excluded.has(tag));
      const fromText = [];
      if (/婚纱照/.test(text)) fromText.push("婚纱照");
      if (/包饺子|春节|团圆/.test(text)) fromText.push("春节团圆");
      if (/工厂|夜班|班车/.test(text)) fromText.push("工厂岁月");
      if (/下雪|雪人/.test(text)) fromText.push("冬日下雪");
      if (/公园.*碰到|重逢/.test(text)) fromText.push("公园重逢");
      return uniqueStrings([...fromTags, ...fromText], 3);
    }

    function extractMemorySignals(text = "") {
      const normalized = String(text || "").trim();
      if (!normalized) return [];
      const signals = [];
      const knownPeople = ["老张", "老伴", "小女儿", "外孙女", "妈妈", "爸爸"];
      const people = knownPeople.filter((name) => normalized.includes(name));
      const places = inferPlaceHints(normalized);
      const timeLabel = inferTimeIntent(normalized);

      if (people.length) {
        signals.push(`整理人物线索：${people.join("、")}`);
      }
      if (places.length) {
        signals.push(`整理地点线索：${places.join("、")}`);
      }
      if (timeLabel) {
        signals.push(`整理时间线索：${timeLabel}`);
      }
      return signals.slice(0, 3);
    }

    function deriveLocalMemoryCandidate(text = "", replyPlan = {}) {
      const normalized = String(text || "").trim();
      if (!normalized) return null;
      if (normalized.length < 3) return null;
      if (replyPlan?.isMetaConversation) return null;
      if (/[？?]$/.test(normalized) && /(不好奇|是谁|你猜|你知道|想不想知道)/.test(normalized)) return null;
      if (/^(你好|在吗|嗯|哦|好|好的|哈哈|hh|谢谢|晚安|早上好)$/i.test(normalized)) return null;

      const people = inferPeopleFromTags([], normalized);
      const places = inferPlacesFromTags([], normalized);
      const times = inferTimeFromTags([], normalized);
      const events = inferEventsFromTags([], normalized);
      const hasNarrativeVerb = /(想起|记得|去了|碰到|看到|拍|吃|玩|打|上班|回家|结婚|过年|聊天|散步)/.test(normalized);
      const signalScore = people.length + places.length + times.length + events.length + (hasNarrativeVerb ? 1 : 0);
      const hasStrongPersonSignal = people.length > 0;
      if (signalScore < 2 && !hasStrongPersonSignal) return null;

      const summary = events[0]
        ? `${events[0]}${people.length ? `｜${people.join("、")}` : ""}`
        : hasStrongPersonSignal
          ? `${people.join("、")}相关线索`
        : `${people[0] || places[0] || times[0] || "这段回忆"}${places[0] ? `｜${places[0]}` : ""}`;

      return {
        filteredText: normalized,
        memorySignal: true,
        candidateType: "event",
        confidence: 0.62,
        people,
        timeType: times.length ? "relative" : "none",
        timeRef: times[0] || null,
        timeConfidence: times.length ? 0.66 : 0,
        isComplete: signalScore >= 3,
        summary,
        narrative: normalized,
        missingPieces: [],
        followUpHint: "可以继续补一句当时的地点、人物或感受。",
        noiseFiltered: [],
        reason: "本地兜底识别到人物/地点/时间/事件信号，先进入待整理线索。"
      };
    }

    function mergePendingCues(signals = []) {
      signals.forEach((signal) => {
        if (!state.pendingCues.find((item) => item.label === signal)) {
          state.pendingCues.unshift({
            id: `cue_${Date.now()}_${Math.random().toString(16).slice(2, 6)}`,
            label: signal,
            sourceText: signal,
            type: "signal",
            status: "pending"
          });
        }
      });
      state.pendingCues = state.pendingCues.slice(0, 8);
    }

    function pushMemoryCandidate(candidate = {}) {
      const id = candidate.id || `candidate_${Date.now()}_${Math.random().toString(16).slice(2, 6)}`;
      const candidateSummary = buildCandidateSummary({
        ...candidate,
        createdAt: candidate.createdAt || toIsoNow()
      }, candidate.filteredText || candidate.summary || "");
      const entry = {
        id,
        label: candidateSummary.label,
        summary: candidateSummary.summary,
        sourceText: candidate.filteredText || candidate.summary || "",
        type: candidate.candidateType || "candidate",
        status: "pending",
        createdAt: candidate.createdAt || toIsoNow(),
        candidate: {
          ...candidate,
          createdAt: candidate.createdAt || toIsoNow()
        }
      };
      state.memoryCandidates.unshift(entry);
      state.pendingCues = [entry, ...state.pendingCues.filter((item) => item.label !== entry.label)].slice(0, 10);
      return entry;
    }

    function updateCompanionStatus(text) {

    function buildVoiceDraftHint() {

    function createTypingRow() {

        <div class="bubble">
          <div class="typing-wrap">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
